# RELEASE_STATE.yaml — VERIFIED SNAPSHOT of project state.
#
# HONEST MODEL: this is a *verified snapshot*, NOT an auto-updating mirror of main.
# It describes main at `snapshot.state_basis_main_sha` as verified at `verified_at`.
# After any later merge to main (INCLUDING this file's own PR), main HEAD advances
# and this snapshot becomes STALE until a future PR refreshes it. That is expected.
#
# The guard (scripts/verify-release-state.mjs) does NOT pretend the snapshot equals
# the current main HEAD. In CI it computes and reports:
#   current_head_sha · snapshot_basis_sha · snapshot_is_stale
# Staleness is a WARNING on push to main (never a hard failure / no self-reference
# paradox / no infinite loop). Hard failures are reserved for: bad shape, a
# fabricated (non-existent) basis commit, >1 STATUS H1, a stale "#120 DRAFT" claim,
# or fabricated Vercel/Stripe runtime state.
#
# Unknown/unprovable-from-repo values MUST be the literal string UNVERIFIED.
# History lives in CHANGELOG.md + docs/STATUS_ARCHIVE.md, NOT here.
schema_version: 2

snapshot:
  state_basis_main_sha: "62c897a54daf3cf503a3b8831c8dcb2d0ce32f3c"   # main HEAD this snapshot describes (after #122 merge)
  verified_production_sha: "62c897a54daf3cf503a3b8831c8dcb2d0ce32f3c" # /api/healthz at verified_at
  verified_at: "2026-06-14T06:43:05Z"
  evidence:
    state_basis_main_sha: "git rev-parse origin/main at snapshot time (BEFORE this PR's own merge)"
    verified_production_sha: "GET https://messenginfo.com/api/healthz -> .sha"
    production_modes: "UNVERIFIED — Vercel env (CANONICAL_MODE_*) is not readable from the repository"
    stripe_environment: "UNVERIFIED — not readable from the repository"
  staleness_note: >
    Refresh state_basis_main_sha + verified_production_sha + verified_at in the next PR
    that changes release truth. CI reports snapshot_is_stale; it does not block merge.

