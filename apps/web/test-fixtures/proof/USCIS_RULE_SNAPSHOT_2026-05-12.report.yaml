  - id: signature_rule
    source_url: "https://www.federalregister.gov/documents/2026/05/11/2026-09289/signatures-on-immigration-benefit-requests"
    fetched_status: VERIFIED
    title: "Signatures on Immigration Benefit Requests"
    document_number: "2026-09289"
    federal_register_citation: "91 FR 25479"
    published_date: "2026-05-11"
    effective_date: "2026-07-10"
    issuing_agency: "USCIS / DHS"
    regulation_amended: "8 CFR 103.2(a)(7)(ii)(A)"
    key_quotes:
      - text: >
          "If USCIS accepts a benefit request and determines later that the
          request was not submitted with a valid signature, USCIS may reject
          or deny the request."
        source: "91 FR 25479, Summary"
      - text: >
          "If USCIS decides to deny a request on the basis of an invalid
          signature, USCIS may retain the associated benefit filing fee and
          consider the application fully adjudicated."
        source: "91 FR 25479, page 25481"
      - text: >
          "USCIS officers have no discretion to 'cure' an invalid signature
          or deficient signature that would have rendered the filing invalid
          at the time of submission."
        source: "91 FR 25479, page 25483"
    invalid_signature_types:
      - "Copy-pasted or digitally affixed signature image"
      - "Typewritten name in place of signature"
      - "Signature created by signature software"
      - "Stamped signature (except civil surgeon exception)"
      - "Signature by attorney/preparer/interpreter instead of applicant"
    forms_affected: "ALL benefit requests — I-821, I-765, I-131, I-131A, I-912 and all others"
    forms_explicitly_exempted: "N-600, N-600K (reject only, not deny)"
    fee_waiver_impact: "Rule does not change fee waiver criteria; I-912 eligibility unchanged"
    ukraine_tps_mention: false
    product_impact: >
      HIGH. Any user who submits I-821/I-765 with a copy-pasted or digital
      signature after 2026-07-10 risks USCIS denying the application and
      keeping the filing fee. Warning required in: PacketCompletenessChecker,
      GeneratePacketBlock signing section, README.txt, FAQ.
    confidence: verified

  - id: hr1_fees_tps_ead
    source_url: "https://www.federalregister.gov/documents/2026/04/29/2026-08333/uscis-immigration-fees-and-related-procedures-required-by-hr1-reconciliation-bill"
    fetched_status: VERIFIED
    title: "USCIS Immigration Fees and Related Procedures Required by H.R.1 Reconciliation Bill"
    document_number: "2026-08333"
    federal_register_citation: "91 FR 22952"
    published_date: "2026-04-29"
    effective_date: "2026-05-29"
    issuing_agency: "USCIS / DHS"
    statutory_basis: "H.R.1 One Big Beautiful Bill Act, P.L. 119-21 (signed July 4, 2025)"
    key_quotes:
      - text: >
          "each initial TPS-based employment authorization 'shall be valid
          for a period of 1 year, or for the duration of the alien's
          temporary protected status, whichever is shorter'"
        source: "91 FR 22952, page 22967 (citing 8 U.S.C. 1811(a))"
      - text: >
          "DHS recognizes that, where a TPS designation is longer than
          12 months, a possible impact of this renewal requirement may be
          that some TPS beneficiaries or prima facie-eligibility applicants
          could face gaps in employment authorization."
        source: "91 FR 22952, page 22968"
      - text: >
          "The fees set forth in H.R.1 are imposed in addition to fees in
          8 CFR part 106 … and are not refundable."
        source: "91 FR 22952, page 22958"
      - text: >
          "The H.R.1 Form I-94 fee … shall not be waived or reduced."
        source: "91 FR 22952, page 22960"
    tps_ead_validity_change:
      rule: "TPS-based EAD validity capped at 1 year or remaining TPS period, whichever shorter"
      prior_practice: "EADs issued for full TPS designation period (up to 18 months) with auto-extensions"
      applies_from: "2026-05-29"
      affected_forms: ["I-765 under 8 CFR 274a.12(a)(12)", "I-765 under 8 CFR 274a.12(c)(19)"]
      ukraine_impact: >
        Ukrainian TPS holders whose TPS runs through Oct 19, 2026 will receive
        EADs valid for only 1 year from issue date. A user who renews EAD
        June 2026 will get an EAD expiring June 2027 — NOT Oct 2026.
        Annual renewal cycle replaces prior 18-month cycles.
    fee_waiver_impact:
      i912_applies_to: "Standard USCIS base fees only (I-821, biometrics, I-765)"
      i912_does_NOT_apply_to:
        - "H.R.1 TPS employment authorization fee"
        - "Asylum application fee ($100)"
        - "Annual Asylum Fee ($100/year)"
        - "Form I-94 fee ($24)"
      key_rule: "H.R.1-mandated fees are non-waivable by statute"
    product_impact: >
      HIGH. Effective May 29, 2026 (17 days from snapshot). Ukrainian TPS
      users will receive shorter EADs. Fee waiver copy must be updated to
      explain I-912 does not waive H.R.1 fees. Any claim that "EAD is valid
      through Oct 19, 2026" needs context: only for EADs issued before May 29,
      2026 under prior rules. New/renewed EADs capped at 1 year.
    confidence: verified

