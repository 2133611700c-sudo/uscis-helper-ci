historical_geography_lock:
  # City was renamed — preserve original name from document
  - lock: "Кіровоград"
    note: "Renamed to Kropyvnytskyi in 2016. Preserve as printed if document predates rename."
  - lock: "Дніпропетровськ"
    note: "Renamed to Dnipro in 2016. Preserve as printed."
  - lock: "Артемівськ"
    note: "Renamed to Bakhmut in 2016. Preserve as printed."
  - lock: "Горлівка"
    note: "Transliterate as printed. Do not substitute modern Ukrainian form."
  - lock: "Луганськ"
    note: "Transliterate as printed. Use 'Luhansk' (Ukrainian transliteration standard)."
  - lock: "Дзержинськ"
    note: "Renamed to Toretsk in 2016. Preserve as printed."
