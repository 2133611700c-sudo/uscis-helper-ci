  files_changed:
  reparole_inventory:
  tps_features_built:
  official_facts_verified:
  older_user_usability_check:
  quality_gates:
  live_verification:
  risks:
  next_recommended_step:

constraints:
  - Do not rewrite unrelated translation engine work.
  - Do not touch Stripe unless Re-Parole TPS parity requires only existing pattern reuse.
  - Do not add fake legal claims.
  - Do not ship if TPS facts cannot be verified from USCIS.
  - Keep scope to functional TPS product skeleton/parity, not full legal finalization.

