      WARN_BG / INFO_BG kept literal light-mode tints (#fff3cd /
      #e8f0fe). They're rare and brief — fee-waiver warning on Step 2
      and the no-passport info box on Step 4. A separate polish pass
      should add dark-mode equivalents.

