bugs_fixed:
  language_switch_wipes_wizard:
    severity: P0
    root_cause: |
      Rehydration effect set 'uploads: {}' unconditionally on mount,
      discarding the OCR fields we had already persisted under
      uploadsMeta. React state remounts on every locale change because
      the wizard lives under [locale]/..., so without proper restore
      the screen reset to Step 1 with no progress.
    file: apps/web/src/app/[locale]/services/tps-ukraine/start/TPSWizardV2.tsx
    fix: |
      Rebuild uploads map from uploadsMeta (without File objects, which
      can't survive serialization, but WITH each doc's fileName, status,
      and OCR fields). Storage key (`wizard:tps-ukraine:v2:state`) is
      locale-independent, so a single shared key + this restore effect
      rebuilds every answer / extracted field / current step on each
      new locale render.

  dark_mode_no_effect_in_wizard:
    severity: P0
    root_cause: |
      Every neutral color in the wizard was a hardcoded hex literal:
        CARD_BG = '#fff', TEXT_PRIMARY = '#111', PAGE_BG = '#f4f5f7'
      The site dark-mode toggle flips CSS variables on <html>, but
      inline hex literals don't react. So the header / footer went
      dark while the wizard surface stayed white.
    file: apps/web/src/app/[locale]/services/tps-ukraine/start/TPSWizardV2.tsx
    fix: |
      Bind every neutral token to the site CSS variables defined in
      globals.css:
        PAGE_BG       -> var(--background)
        CARD_BG       -> var(--surface-1)
        BORDER        -> var(--border)
        BORDER_LIGHT  -> var(--surface-3)
        TEXT_PRIMARY  -> var(--text-1)
        TEXT_SECONDARY-> var(--text-2)
        TEXT_MUTED    -> var(--text-3)
        TEXT_HINT     -> var(--text-3)
        TEXT_FAINT    -> var(--text-3)
      Brand colors (TPS green, pay-blue) and alert tints stay literal —
      brand must look identical in both modes.
    anti_flash:
      already_present: true
      location: apps/web/src/app/[locale]/layout.tsx:125
      note: |
        Inline <script> applies the dark class to <html> before React
        hydration, so navigating to a new locale does not flash light
        mode for users who chose dark.

reusable_patterns_audit:
  translate_document:
    state_persistence: server-side via sessionId in URL — different model from TPS
    css_vars: yes (re-parole status page uses var(--background), var(--surface), var(--border))
  re_parole:
    state_persistence: in-memory only, single-page flow — no persistence problem
    css_vars: yes
  decision: |
    TPS uses localStorage because the wizard has a multi-step flow that
    crosses Stripe checkout (full external navigation). Neither
    translate-document nor re-parole had the same constraint, so there
    was no existing pattern to copy — but the CSS-variable design
    system the other pages already use was straight-applicable, and
    that's what was wired in.

