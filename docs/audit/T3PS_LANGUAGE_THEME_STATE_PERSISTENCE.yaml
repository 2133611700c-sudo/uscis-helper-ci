remaining_polish_notes:
  - id: language_switcher_dropdown_aria
    priority: P3
    description: |
      Header LanguageSwitcher renders as a single ES/RU/UK/EN dropdown,
      not 4 separate aria-labelled buttons. The Playwright proof used
      direct URL navigation to bypass this UI nuance. Functionality is
      identical (both routes do a Next.js push to /{locale}/...). If
      anyone needs to grep by aria-label later, the wrapping <select>
      element doesn't expose per-option buttons.

  - id: alert_tints_in_dark
