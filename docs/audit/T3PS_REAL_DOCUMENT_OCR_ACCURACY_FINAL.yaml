critical_failures: []

root_causes_fixed:
  - id: parseDate_two_digit_year
    description: |
      parseDate only accepted 4-digit years. Real Ukrainian passport
      visual zone is "DD.MM.YY" (e.g. "13.07.85"). Validator
      dropped dob into validated_skipped['date not parseable'].
    fix: |
      Added DD.MM.YY and DD/MM/YY formats with century-resolve
      (YY > currentYear%100 + 10 ⇒ 19YY else 20YY) so '85' → 1985,
      '30' → 2030.

  - id: parseDate_cyrillic_months
    description: |
      Visual zone also stamps "D MMM YYYY" with Cyrillic month tokens
      (СІЧ / ЛЮТ / БЕР / ... / ГРУ for Ukrainian; ЯНВ / ФЕВ / ... / ДЕК
      for Russian). Old token map was Latin-only.
    fix: |
      Added full Ukrainian + Russian month abbreviation tables. Visual
      regex char class extended to include Cyrillic + Ukrainian-
      specific letters (Іі Її Єє Ґґ). 2-digit-year branch reused.

  - id: sex_validator_too_strict
    description: |
      validateBrainField checked .toUpperCase().charAt(0) against
      M/F/X — Cyrillic Ч / Ж / "Ч / M" all rejected.
    fix: |
      Sex normalizer pads input with spaces, strips non-letters, and
      scans for any recognizable marker anywhere: Latin M/F/X, Cyrillic
      Ч/Ж, ЧОЛ/ЖІН/МУЖ/ЖЕН full words. Writes canonical Latin back to
      final_value so PDF prefill never sees Cyrillic.

  - id: cyrillic_safety_guard_ordering
    description: |
      Validator started with hasCyrillic(final_value) hard-reject. That
      gated dob/sex/country normalization — they never got a chance to
      convert Cyrillic to Latin/numeric form.
    fix: |
      Guard now skipped for fieldKey ∈ {dob, *_date, sex,
      country_of_nationality, passport_country_of_issuance} — those
      fields normalize themselves and write back canonical Latin.

  - id: country_bilingual_stamp
    description: |
      Brain pulled "Ukraina / Ukraine" as one token from the bilingual
      stamp. Single-shot normalizeCountry didn't recognize the joined
      form.
    fix: |
      Country validator splits on / and runs each half through
      normalizeCountry; first successful alias match wins.

  - id: brain_prompt_ukrainian_rules
    description: |
      SYSTEM_PROMPT didn't explicitly teach the LLM about Cyrillic sex
      markers, 2-digit years, Cyrillic months, or the dob-vs-issue-date
      safety rule.
    fix: |
      Prompt extended with rules 9-14: sex Ч/Ж → M/F, Cyrillic month
      table, 2-digit year normalization, do-not-confuse dob with issue
      or expiration date, Ukrainian passport number shape, a_number
      digits-only with no A prefix.

best_practices_collected_from_other_services:
  - id: vision_language_hints
    where: apps/web/src/lib/ocr/providers/google-vision.ts:117
    pattern: 'languageHints: ["uk", "en", "ru"]'
    reuse: already applied to TPS (single shared OCR provider)
  - id: shared_deepseek_client
    where: apps/web/src/lib/deepseek/client.ts
    pattern: one client, one DEEPSEEK_API_KEY, environment-driven
    reuse: TPS Brain uses the same client, no duplicate config
  - id: mrz_parser
    where: apps/web/src/lib/translation/identity/mrzParser.ts
    pattern: TD3 + TD1 with check-digit validation
    reuse: TPS passport module imports parseTd3 directly
  - id: kmu55_transliteration
    where: apps/web/src/lib/tps/transliterate.ts
    pattern: Ukrainian KMU-55 official Latin transliteration
    reuse: used by Brain hardening to enforce non-Cyrillic name finals

