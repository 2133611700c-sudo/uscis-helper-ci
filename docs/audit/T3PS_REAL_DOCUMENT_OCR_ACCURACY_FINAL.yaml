    POST /api/tps/ocr/extract with realistic UA passport fixture:
      vision_text_length: 411
      brain_status: ran
      final_field_count: 8
      validated_skipped: []
      extracted:
        family_name: Kuropyatnyk
        given_name: Taras
        dob: "07/13/1985"
        sex: M
        country_of_nationality: Ukraine
        passport_number: EK790396
        passport_country_of_issuance: Ukraine
        passport_expiration_date: "01/01/2030"
  health_endpoint:
    sha_at_test_time: 66de140 (deploy READY before curl)
    note: CDN may serve cached /api/tps/health SHA briefly; OCR endpoint
      is dynamic so the test above runs against the live code.

remaining_gaps:
  - id: real_user_image_quality
    priority: P1
    description: |
      Synthetic-but-realistic UA passport now passes 8/8. Real photo
      uploads can still fail at the IMAGE layer (blur, glare, severe
      rotation, missing biographic zone). These are pre-OCR problems
      — the recommendation is to ship the existing improvements,
      monitor real uploads, then add image-quality hints (P1 from the
      learning-loop spec — smart retake).

  - id: i94_real_world_matrix
    priority: P1
    description: |
      I-94 PDF screenshots from cbp.dhs.gov vary in layout. Pull a
      handful of real (redacted) samples and confirm
      i94_admission_number / class_of_admission / last_entry_date
      extraction holds.

  - id: ead_real_world_matrix
    priority: P1
    description: |
      EAD card photo orientation can be either landscape or portrait;
      A-number / category / expiration extraction should be tested
      against both with real samples.

  - id: brain_dob_safety
    priority: P2
    description: |
      Brain prompt now tells the LLM not to use issue/expiration as
      dob, but there's no programmatic check that the chosen dob
      isn't equal to either. Add an anti-confusion check inside
      validateBrainField: if dob == passport_expiration_date or
      dob == issue date, force review_required.

