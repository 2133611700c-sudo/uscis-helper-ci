remaining_gaps:
  - id: source_label_accuracy
    priority: P1
    blocker: false
    description: |
      TPSWizardV2 RW() rows hardcode source per field name. When Brain provides
      a field (extraction_source='ai_brain'), the UI still says "Паспорт → OCR".
      Fix: thread extraction_source from upload entry through to RW so the label
      shows "AI → review required" vs "Паспорт MRZ", etc.

  - id: patronymic_explainer
    priority: P2
    blocker: false
    description: |
      International passport never has patronymic. Empty dash looks like a
      bug to RU/UK users who have patronymics in their internal passport.
      UX should show "Не присутствует в этом документе" when field key
      is patronymic AND brain_document_type=international_passport.

  - id: a_number_normalizer
    priority: P2
    blocker: false
    description: |
      Display can format as A123-456-789; internal value must be digits-only
      for PDF prefill. Today the value carries dashes through to packetBuilder.
      Verify packetBuilder strips non-digits before writing to I-821/I-765
      A-number fields.

  - id: missing_field_humanization
    priority: P1
    blocker: false
    description: |
      Empty "—" gives users no recovery path. Replace with localized
      "Не найдено — можно ввести вручную" + clickable edit field. Improves
      conversion for users whose docs partially fail OCR.

  - id: real_document_quality_matrix
    priority: P0
    blocker: false
    description: |
      Need to test with redacted real Ukrainian passport scans (not just
      synthetic). Taras's real upload showed a_number from EAD merging,
      so the matrix should include passport+EAD upload combo.

next_action: |
  1. Taras retests the wizard with the same real documents he used before.
     Expected: dob now populated, "Ukraine" instead of "UKR".
  2. Ship source-label accuracy + missing-field humanization as one PR.
  3. After that, run real-document matrix on redacted passport / EAD /
     I-94 combinations to close the PARTIAL_OCR_QUALITY_GAP gap to GO.

