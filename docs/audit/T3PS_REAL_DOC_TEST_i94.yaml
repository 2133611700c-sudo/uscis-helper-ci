  status: FAIL
  failure_reason: |
    Two contract-level bugs and one regex bug:
      1. i94_admit_until — the SINGLE most important I-94 field for
         TPS (tells the user when current parole/status expires) was
         extracted correctly by Brain from 'Admit Until Date:
         09/07/2026' but then rejected by the slot contract because
         the i94 allowed_fields list never included it. Same fate
         for country_of_nationality, which is printed on every CBP
         I-94 record.
      2. last_entry_date — Brain didn't extract it either, because
         the rule i94 module's date regex only matched MM/DD/YYYY
         and CBP's web printout uses 'YYYY Month DD' format
         ('2022 September 09'). Brain saw the line, but the rule
         module set the anchor, so Brain didn't bother surfacing
         what looked like rule-territory.
  critical_fields_matched: 1 of 3

fix_applied_in_commit: c4c8cea
fix_summary:
  - documentContracts.ts: added 'i94_admit_until' and
    'country_of_nationality' to the i94 allowed_fields list.
    Comment block above each entry explains WHY (admit_until is the
    expiry date that drives TPS eligibility; country is bilingual
    cross-check).
  - documentBrain.ts: added i94_admit_until to the
    DocumentBrainResultSchema.fields Zod object AND advertised it
    in the SYSTEM_PROMPT schema block.
  - modules/i94.ts: added yyyyMonthDdToUs() / anyDateToUs() helpers
    and a second-pass findLabelledValue() call for both
    last_entry_date and admit_until that accepts
    '\\b\\d{4}\\s+[A-Za-z]{3,9}\\s+\\d{1,2}\\b'.
    Result is normalized to MM/DD/YYYY then ISO YYYY-MM-DD so the
    rest of the pipeline keeps working unchanged.

