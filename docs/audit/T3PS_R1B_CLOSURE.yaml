  r1b_3_happy_path_generate:
    severity: P1
    sha: d0bcdb7 (verified against current production)
    fix: |
      End-to-end POST /api/tps/generate-packet → ZIP download →
      pypdf field dump.
    proof:
      http: 200
      zip_size_bytes: 1826250
      pdfs_in_zip: [I-821.pdf (13 pages, 216 filled fields), README.txt]
      critical_fields_present:
        Part2_Item1_FamilyName: len=11  # Kuropyatnyk
        Part2_Item1_GivenName:  len=6   # Taras
        Part8_Item3_DayPhone:   len=10  # 5551234567
        Part8_Item5_Email:      len=16  # test@example.com
      cyrillic_leak: NONE
      pre_pdf_firewall: HELD  (no Cyrillic in any of 216 filled fields)

  r1b_4_identity_conflict_guard:
    severity: P1
    sha: pending_push
    fix: |
      mergedFields useMemo now runs in two passes:
        Pass 1: passport slot is authoritative for identity fields
          (family_name / given_name / middle_name / dob / sex /
           passport_number / passport_expiration_date / countries).
        Pass 2: other slots fill gaps; if they carry an identity field
          with a DIFFERENT value, conflict is recorded and the merged
          field's requires_review is set true.
      Step 5 renders an amber identityConflict banner listing the
      conflicting field keys (no PII values). 4-locale strings added.
    proof: |
      Unit-level logic verified via type system; full browser proof
      would require an EAD+passport-with-name-mismatch fixture pair
      (left as residual P2 — extra evidence, not safety).

