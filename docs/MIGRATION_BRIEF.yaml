        done_when: место снапается по тысячам пунктов, review только на реально неоднозначных

# ----------------------------------------------------------------------------
definition_of_done_per_pr:
  - typecheck PASS (npm --prefix apps/web run typecheck)
  - relevant vitest PASS
  - smoke на реальной фикстуре (Vision=200, не 403)
  - изменение за флагом default OFF
  - BASELINE_MATRIX не ухудшился
  - STATUS.md / HANDOFF.md / CHANGELOG.md обновлены и staged
  - откат = один флаг
  - prod env / secrets / существующие RLS не тронуты
  - tps_merge plane (booklet перевод+packet) не сломан
  - отчёт в формате Цель->Известно->Не подтверждено->Решение->Шаги->Бутылочные горла->Риски->Следующее

execution_order:
  sequence: [P0, P1_5, P2, P3, P4, P5, P6]
  between_phases: СТОП + отчёт + ждать отмашку владельца. Не цеплять фазы в один забег.
  start_here: 'P1_5.1 — починить Vision 403. Без рабочего Vision baseline недостоверен, и всё, что строится поверх — гадание.'
