# ============================================================================
# MIGRATION_BRIEF.yaml — uscis-helper -> "один живой мозг + словари внутри него"
# Источник истины для агента. Ссылаться на этот файл, а не на чат.
# Формат каждого отчёта агента: Цель -> Известно -> Не подтверждено ->
#   Решение -> Шаги -> Бутылочные горла -> Риски -> Следующее действие.
# ============================================================================
meta:
  id: uscis-helper-migration
  version: 1
  prod_sha: 31353a7da7a575e23f848abc793d9adcbc6950f1
  repo_root: /Users/sergiiivanenko/work/uscis-helper
  app: apps/web
  mode: principal-execution-agent / co-founder   # НЕ assistant mode
  rules_of_evidence: [Confirmed, Hypothesis, UNKNOWN]   # маркировать каждое утверждение
  no_speculation: true        # пустоты знаний не заполнять догадками
  no_flattery: true

operator_contract:            # нарушение любого пункта = СТОП
  path_prelude: 'export PATH="/opt/homebrew/bin:$HOME/.nvm/versions/node/v24.11.1/bin:$PATH"'
  behavior_changes_behind_flag: true       # каждый флаг default OFF
  no_big_bang: true                        # strangler-fig: один продукт x один класс за раз
  phase_boundary_stop: true                # после фазы стоп + отчёт + ждать отмашку владельца
  forbidden:
    - prod env (меняет только владелец вручную)
    - secrets (не читать значения, только имена)
    - Supabase RLS/GRANT существующие (можно ДОБАВЛЯТЬ таблицу, не трогать политики)
    - Stripe / payment
    - UI redesign
    - воскрешение мёртвого consensus/orchestrator кластера
  commits:
    sign: '--no-gpg-sign'
    precommit_requires_staged: [STATUS.md, HANDOFF.md, CHANGELOG.md]
  long_scripts: 'nohup bash s.sh > /tmp/out.txt 2>&1 & ; sleep N ; cat /tmp/out.txt'
  playwright: 'apps/web/node_modules/.bin/playwright, запускать из apps/web/'
  chrome_precheck: 'list_connected_browsers -> select_browser (deviceId 9442cdb8-8d89-4220-a6fa-68b591c9b1a2) перед заявлением о недоступности'

# ----------------------------------------------------------------------------
# ПРОТОКОЛ НОН-СТОП — главное правило поведения агента (2026-06-03)
# ----------------------------------------------------------------------------
non_stop_protocol:
  lanes:
    AUTONOMOUS:
      desc: выполнять БЕЗ вопросов, нон-стоп
      includes: [чтение кода, трассировка, правки за флагом default OFF, юнит-тесты, typecheck, harness-smoke на бесплатных путях, обновление docs]
    OWNER_GATE:
      desc: физически не может агент — НЕ делать, парковать
      includes: [платные API-прогоны, prod env, billing, браузер-авторизация, необратимые удаления, ground-truth значения]
      park_to: docs/reports/OWNER_QUEUE.md
  iron_rules:
    - НИКОГДА не останавливать весь run из-за одного owner-gate. Запарковал -> взял следующий AUTONOMOUS-кирпич -> продолжил.
    - Останавливать run ТОЛЬКО когда (а) не осталось выполнимых AUTONOMOUS-кирпичей, ИЛИ (б) typecheck/тест падает и не чинится за 2 попытки, ИЛИ (в) действие угрожает проду.
    - Owner-gate задачи копить и выдавать ОДНИМ батчем на чекпойнте фазы — не по одной, не посреди работы.
    - Запрещён ложный прогресс. "core_status=ok"/"4 fields" = ЖИВОСТЬ, НЕ ТОЧНОСТЬ. В каждом baseline явно liveness vs accuracy.
    - Любое структурное утверждение ("X не вызывается") подкреплять сырым выводом команды в отчёте.
    - Никаких обходов owner-gate шелл-скриптами/неаутентифицированным браузером. Уперся в auth/billing -> паркуй.

# ----------------------------------------------------------------------------
# ДВА ПЛАНА МОЗГА — не смешивать в один тезис "мозг". Подтверждено Фазой 1.
# ----------------------------------------------------------------------------
brain_planes:
  ocr_core:
    desc: общий live OCR spine для всех 4 продуктов
    reader: apps/web/src/lib/docintel/documentFieldReader.ts        # readDocument
    judge:  apps/web/src/lib/canonical/core/arbitration.ts          # arbitrateDocument
    dict_door: apps/web/src/lib/docintel/transliterationPolicy.ts -> apps/web/src/lib/tps/dictionaryBridge.ts
    fanout: NONE   # geminiVisionProvider возвращает на первой модели (118,145) — один ридер
  tps_merge:
    desc: ОТДЕЛЬНЫЙ живой post-OCR merge brain (НЕ трогать как "dead")
    entry:  apps/web/src/lib/tps/centralBrain.ts:100                 # mergeToCentralBrain
    route:  apps/web/src/app/api/tps/brain/merge/route.ts:69
    ui:     apps/web/src/app/[locale]/services/tps-ukraine/start/TPSWizardV2.tsx:2076
    consumers_downstream:
      - apps/web/src/app/api/tps/translation/preview/route.ts:65     # booklet перевод
      - apps/web/src/lib/tps/packetBuilder.ts:164                    # сборка пакета
      - apps/web/src/lib/tps/translationBridge.ts:392
    warning: 'резать tps/centralBrain = сломать booklet translation preview + packet'

