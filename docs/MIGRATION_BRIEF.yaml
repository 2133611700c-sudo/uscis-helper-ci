# ----------------------------------------------------------------------------
# БЛОКЕРЫ — должны быть сняты до доверия любому baseline (это и есть "что не сделано")
# ----------------------------------------------------------------------------
blockers:
  B1_google_vision_403:
    fact: 'Google Vision вернул HTTP 403 во время route-smoke => OCR-текстовый слой не работал => baseline недостоверен'
    impact: 'MRZ-crossref, keyword-модули, dual-OCR — все зависят от Vision text; без него числа review_required искажены'
    must_fix_before: P1.5 baseline matrix
  B2_local_next_dev_degraded:
    fact: 'next dev: /api/* -> 404, "Failed to find Server Action", повторяющиеся EMFILE watcher errors'
    impact: 'localhost app-router НЕ источник истины; direct route-handler invocation надёжнее'
    workaround: 'baseline снимать прямым вызовом POST() handlers с .env.local, как уже делал агент'
  B3_presence_passport_guard:
    fact: 'engine/presence.ts отдал пустые printed fields под guard "printed field not found in OCR" => fail на IVANENKO'
    impact: 'presence/central-brain cluster нельзя считать безопасной опорой; но это side-path, не live core'
    decision: 'не чинить presence — он в dead-плоскости; зафиксировать как причину НЕ опираться на него'

# ----------------------------------------------------------------------------
# ЦЕЛЕВОЕ СОСТОЯНИЕ ("done" для всего брифа)
# ----------------------------------------------------------------------------
target_state:
  - все 4 продукта читают через один OCR-core, со ВСЕМИ словарями внутри живой двери
  - умные словари (snapCity, reconcilePatronymic, registry lookups, серверный classifyGarbage) работают в core, не в orchestrator
  - стадия верификации: расхождение источников -> review_required, без тихой подмены
  - provenance-лог на поле (значение / источник чтения / какие словари тронули / confidence / review)
  - tps_merge plane сохранён и не сломан (booklet перевод + packet работают)
  - мёртвый кластер удалён, Translation dead-branch вырезан, legacy-routes карантинированы
  - газеттир расширен (КАТОТТГ), снаппер работает в мозге

# ----------------------------------------------------------------------------
# БРИКИ. Поля каждого: id, depends_on, owner_gate, files, action, flag, tests,
#   smoke, rollback, done_when. owner_gate=true => остановиться и ждать владельца.
# ----------------------------------------------------------------------------
phases:

  - id: P0
    name: Добить GEMINI_MODEL
    bricks:
      - id: P0.1
        owner_gate: true
        action: 'ВЛАДЕЛЕЦ вручную: printf "gemini-2.5-flash" | vercel env add GEMINI_MODEL production --force ; vercel --prod'
        agent_role: подготовить команду, не выполнять, ждать подтверждения
        done_when: prod env без хвостового \n
      - id: P0.2
        depends_on: [P0.1]
        owner_gate: true
        action: 1 booklet через прод, в логах подтвердить модель = gemini-2.5-flash и отсутствие 404-round-trip
        done_when: лог показывает корректный model-id

  - id: P1_5
    name: СНЯТЬ БЛОКЕРЫ СРЕДЫ + полная baseline matrix (это и есть незакрытый T1.3)
    status: CLOSED-SMART   # 2026-06-03: Vision billing НЕ нужен для baseline живого пути.
    closed_smart_rationale: |
      Live core читает через ОДИН Gemini (geminiVisionProvider), НЕ через Google Vision OCR.
      Поэтому Vision 403 НЕ блокирует baseline живого пути. Baseline снят на Gemini-core subset.
      Доказательство: docs/reports/BASELINE_MATRIX.md.
      ВАЖНО: baseline = LIVENESS ONLY (пайплайн не падает), НЕ accuracy.
      Точность booklet остаётся НЕизмеренной до P1.5.4 (ground-truth) — owner-gate.
      P1.5.1 (Vision auth) и P1.5.3 (платная полная матрица) остаются owner-gate, но НЕ блокируют P2.
    rationale: 'baseline с Vision 403 недостоверен. Сначала рабочая среда, потом числа.'
    bricks:
      - id: P1.5.1
        title: Починить Google Vision auth в harness-среде
        files: [apps/web/.env.local, apps/web/src/lib/ocr/providers/google-vision.ts]
        action: |
          Диагностировать 403: какой ключ/服务-account используется в harness vs prod.
          Проверить GOOGLE_CLOUD_VISION_API_KEY / GOOGLE_VISION_SERVICE_ACCOUNT_JSON присутствие (имена, НЕ значения).
          Цель: тот же путь аутентификации, что в проде, доступен локальному harness.
        owner_gate: true   # если нужен новый ключ/служебный аккаунт — решает владелец
        done_when: пробный Vision-вызов на 1 фикстуре возвращает 200, не 403
      - id: P1.5.2
        title: Зафиксировать harness как источник истины (не next dev)
        files: [apps/web/src/lib/engine/__tests__/pipeline.live.e2e.test.ts]
        action: 'baseline снимать прямым вызовом route POST() handlers с .env.local; next dev НЕ использовать (B2)'
        done_when: воспроизводимый harness-скрипт, удаляемый после прогона
      - id: P1.5.3
        title: ПОЛНАЯ baseline matrix product x class (с рабочим Vision)
        depends_on: [P1.5.1, P1.5.2]
        owner_gate: true   # платные вызовы
        classes: [international_passport, internal_booklet, id_card, birth_certificate, soviet_birth_certificate, marriage_certificate, military_id, i94, ead, i797, driver_license]
        products: [TPS, Translation, ReParole, EAD]
        action: |
          Прогнать каждую применимую пару product x class на реальной фикстуре из test-fixtures/real-docs/.
          Записать строку: product | class | brain_plane | какой ридер | какие словари применились | review_required count | invented_fields count | pass/fail.
        output_file: docs/reports/BASELINE_MATRIX.md
        done_when: матрица заполнена реальными прогонами (не из кода), Vision=200, помечены классы без фикстуры как UNKNOWN
      - id: P1.5.4
        title: GROUND-TRUTH для booklet (без него P2 неизмерим)
        problem: |
          Без верных значений нечем доказать "стало точнее" в P2.
          "baseline не ухудшился" сейчас = пустые слова (accuracy не измерена ни на одном booklet).
        autonomous_part: |
          Сгенерить шаблон ground-truth JSON на 3-4 реальных booklet из test-fixtures/real-docs/.
          Поля пустые, со списком ожидаемых ключей и путём к фикстуре.
          Положить в test-fixtures/real-docs/ground-truth/.
        owner_gate_part: |
          Владелец вписывает верные значения глазами с документа. Только человек знает истину.
          Задача в OWNER_QUEUE.md.
        owner_gate: true
        done_when: шаблоны созданы (autonomous) + владелец вписал значения (owner-gate)

  - id: P2
    name: ВСТРОИТЬ СЛОВАРИ В ЖИВОЙ МОЗГ (ядро)
    flag: SMART_NORMALIZE_ENABLED   # default OFF, на всю фазу
    rationale: перенести логику ИЗ мёртвого orchestrator В живую дверь transliterationPolicy/dictionaryBridge
    bricks:
      - id: P2.1
        title: city_of_birth -> snapCity (газеттир) в мозге
        files:
          - apps/web/src/lib/docintel/transliterationPolicy.ts   # ветка city
          - apps/web/src/lib/tps/dictionaryBridge.ts             # normalizeCity
        action: |
          После normalizeCity(GEO_CORRECTIONS), ДО transliterateKMU55, вызвать snapCity(value).
          matched=true -> взять snapped value; matched=false -> review_required=true (НЕ тихая подмена).
        tests: 'vitest: Простянець->Тростянець snap ok; неизвестное село -> review_required=true'
        smoke: 2 буклета с не-областными местами через harness
        rollback: SMART_NORMALIZE_ENABLED=OFF
        done_when: место снапается или уходит на review; baseline (BASELINE_MATRIX) не ухудшился
      - id: P2.2
        title: middle_name/patronymic -> reconcilePatronymic
        files: [apps/web/src/lib/docintel/transliterationPolicy.ts]
        action: 'reconcilePatronymic(value, givenName, sex); рукопись -> review_required=true всегда'
        tests: vitest на согласованность отчества с именем+полом
        rollback: flag OFF
        done_when: отчество сверяется с именем; конфликт -> review
      - id: P2.3
        title: authority/issued_by -> lookupAuthority + translateCivilRegistryTerm в bridge
        files: [apps/web/src/lib/tps/dictionaryBridge.ts]
        note: позже убрать дублирование из legacy militaryId.ts/birthCertificate.ts (P5)
        tests: vitest на РАЦС/ЗАГС/ДРАЦС раскрытие
        rollback: flag OFF
      - id: P2.4
        title: settlement -> lookupSettlement / normalizeSettlementType
        files: [apps/web/src/lib/tps/dictionaryBridge.ts]
        rollback: flag OFF
      - id: P2.5
        title: серверный анти-мусор classifyGarbage до клиента
        files: [apps/web/src/lib/canonical/core/arbitration.ts, apps/web/src/lib/docintel/documentFieldReader.ts]
        action: 'classifyGarbage в reader или arbitrate -> мусор режется на сервере, не только в UI'
        tests: vitest на мусорные значения
        rollback: flag OFF
    phase_done_when: SMART_NORMALIZE_ENABLED=ON на TPS, BASELINE_MATRIX не ухудшился, typecheck PASS

  - id: P3
    name: СТАДИЯ ВЕРИФИКАЦИИ (анти-фейк, БЕЗ воскрешения consensus)
    gate:
      id: P3.GATE
      owner_gate: true
      title: ГЕЙТ СТОИМОСТИ/НЕЗАВИСИМОСТИ — обязателен до любого fanout
      reason: 'шрам владельца — потеря денег на нерасчётном решении. fanout платный на каждый документ.'
      experiment:
        files: [test-fixtures/real-docs/, apps/web/src/lib/docintel/providers/]
        action: |
          Прогнать 9 фикстур через ТРИ архитектурно разных движка: Gemini (LLM) x Google Vision (OCR) x DocAI.
          ВАЖНО: Gemini x Gemini = НЕ сверка (одинаковые галлюцинации). Независимость = разные движки.
          Замерить: расходятся ли они на ошибках (ловит ли один то, что другой врёт), и стоимость на документ.
        output_file: docs/reports/FANOUT_GATE.md
      decision_rule:
        - 'движки расходятся и ловят ошибки -> Google-only fanout оправдан -> строить P3.2'
        - 'все трое тихо согласны на неверном (вероятно на рукописной кириллице) -> fanout мёртв -> только структурные верификаторы + обязательный human review на фамилию/место из буклета'
    bricks:
      - id: P3.1
        title: структурные верификаторы (дёшево, строить сразу, не ждут гейта)
        files: [apps/web/src/lib/canonical/core/arbitration.ts, apps/web/src/lib/canonical/core/mrzAuthority.ts]
        action: 'MRZ<->visible-zone сверка; gazetteer-snap как верификатор места; patronymic-consistency; date sanity. Расхождение -> review_required.'
        tests: vitest на фикстурах с известными ошибками -> поднимается review_required
        rollback: flag VERIFY_STRUCT_ENABLED OFF
      - id: P3.2
        title: второй независимый ридер (ТОЛЬКО если P3.GATE зелёный)
        depends_on: [P3.GATE]
        flag: VERIFIER_SECOND_READ_ENABLED   # default OFF
        files: [apps/web/src/lib/docintel/documentFieldReader.ts, apps/web/src/lib/canonical/core/arbitration.ts]
        action: 'добавить Vision/DocAI как кандидатов; arbitrateDocument сравнивает; расхождение -> review_required'
        rollback: flag OFF
    phase_done_when: на фикстурах с известными ошибками верификатор поднимает review там, где раньше уходило тихо

  - id: P4
    name: PROVENANCE-ЛОГ (Аудитор со схемы; additive)
    bricks:
      - id: P4.1
        title: per-field provenance в arbitrate
        files: [apps/web/src/lib/canonical/core/arbitration.ts, apps/web/src/lib/canonical/types.ts]
        action: 'на каждое поле: значение / источник чтения (модель) / какие словари тронули / confidence / review_required'
        rollback: не влияет на выдачу (только обогащает результат)
      - id: P4.2
        title: персист в Supabase (НЕ трогать существующие RLS)
        owner_gate: true   # новая таблица в проде
        action: 'новая таблица provenance, RLS по образцу остальных (добавить, не менять); только запись, без влияния на выдачу'
        done_when: на 1 прогон есть полный provenance-след каждого поля

  - id: P5
    name: УБОРКА (только после того как живой мозг доказал словари+верификацию)
    bricks:
