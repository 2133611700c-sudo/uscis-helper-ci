name: Post-Deploy Smoke

# Meta-finding from the 2026-06-11 broken-CLI-deploy incident: CI validated the
# BUILD (tsc + tests + build), but nothing validated the DEPLOYED ARTIFACT — a
# broken vision-extract served 504s for ~15 min until a manual probe caught it.
#
# P1 (2026-06-14) — STOP BURNING PAID OCR ON EVERY DEPLOY: this workflow used to
# POST a real synthetic document to vision-extract on EVERY production deploy,
# consuming paid Google Vision quota and FAILING during a (temporary) provider
# rate-limit — i.e. a transient provider 429 would fail the deploy gate. That is
# wrong: a deploy smoke must validate the DEPLOYED ARTIFACT, not the provider.
#
# It now does a CONTRACT check that calls NO paid provider:
#   1. healthz returns 200
#   2. vision-extract is wired and returns its TYPED error contract for a
#      malformed request (no `file`) — proving the route deployed and short-
#      circuits BEFORE any provider call (no OCR spend, no rate-limit flakiness).
# The paid provider-availability probe moved to ocr-availability-probe.yml (cron).
on:
  deployment_status:
  workflow_dispatch:

jobs:
  smoke:
    # run only for successful PRODUCTION deployments (or manual dispatch)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       (github.event.deployment.environment == 'Production' ||
        github.event.deployment.environment == 'production'))
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6
      - name: Probe healthz
        run: |
          code=$(curl -s -o /tmp/h.json -w "%{http_code}" --max-time 20 https://messenginfo.com/api/healthz)
          echo "healthz HTTP=$code $(cat /tmp/h.json)"
          [ "$code" = "200" ] || { echo "::error::healthz failed ($code)"; exit 1; }
      - name: Contract check vision-extract (NO paid OCR)
        run: |
          # Malformed request (no `file`) — the route validates and returns its
          # typed error BEFORE any provider call. This proves the artifact is
          # deployed and the contract is intact, with ZERO Vision/OCR spend and
          # NO sensitivity to a transient provider rate-limit.
          code=$(curl -s -o /tmp/v.json -w "%{http_code}" --max-time 30 -X POST \
            https://messenginfo.com/api/translation/vision-extract \
            -F "docTypeId=ua_internal_passport_booklet")
          echo "vision-extract contract HTTP=$code"
          head -c 300 /tmp/v.json; echo
          # Expect 400 (missing file) with ok:false — the route is wired and
          # short-circuits cleanly. A 5xx/404/timeout means the artifact is broken.
          if [ "$code" != "400" ]; then
            echo "::error::vision-extract contract check FAILED (HTTP $code, expected 400) — the deployed artifact may be broken (see OPS_INCIDENT_LOG 2026-06-11). Roll back per docs/runbook.md."
            exit 1
          fi
          python3 - <<'PY'
          import json, sys
          d = json.load(open('/tmp/v.json'))
          if d.get('ok') is not False or not d.get('error'):
              print(f"::error::vision-extract contract shape unexpected: {d} "
                    "— route did not return its typed {ok:false,error} contract.")
              sys.exit(1)
          print("vision-extract contract OK (ok:false + typed error, no OCR spend)")
          PY
