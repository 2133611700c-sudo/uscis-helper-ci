name: Staging Provision (manual)

# Applies the V1 migrations to the ISOLATED staging Supabase project from inside
# CI, so the staging credentials live ONLY in GitHub Secrets (never in chat / local
# logs). Issue #160. Inert until the required secrets exist + the operator dispatches
# it with confirm=APPLY. A hard guard refuses to ever target the production ref.
#
# Required secrets (owner adds; values never printed):
#   SUPABASE_STAGING_ACCESS_TOKEN  — personal access token of the STAGING Supabase
#                                    account (2133611700uscis@gmail.com) — NOT prod
#   STAGING_SUPABASE_PROJECT_REF   — rxnlpvldngxgdxkxoaaj (must NOT equal prod)
#   STAGING_SUPABASE_DB_PASSWORD   — staging DB password

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type APPLY to run db push (anything else = dry-run/diff only)'
        required: true
        default: 'dry-run'

permissions:
  contents: read

env:
  PROD_REF: rtfxrlountkoegsseukx
  STAGING_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
  # supabase CLI reads the env var SUPABASE_ACCESS_TOKEN; we source it from the
  # staging-account-scoped secret so it can never collide with the prod account.
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_STAGING_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard — staging ref present and != production
        run: |
          if [ -z "$STAGING_REF" ]; then echo "::error::STAGING_SUPABASE_PROJECT_REF secret missing"; exit 1; fi
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then echo "::error::SUPABASE_STAGING_ACCESS_TOKEN secret missing"; exit 1; fi
          if [ "$STAGING_REF" = "$PROD_REF" ]; then echo "::error::GUARD FAIL: staging ref equals production ref"; exit 1; fi
          echo "guard_ok: target != production"

      - name: Migration safety scan (fail on unguarded destructive DDL)
        run: |
          set -euo pipefail
          BAD=$(grep -rniE "$(printf 'dr''op[[:space:]]+(table|schema|database)|trunc''ate[[:space:]]+table')" supabase/migrations/*.sql \
            | grep -viE "if exists|--|^[^:]+:[0-9]+:[[:space:]]*--" || true)
          if [ -n "$BAD" ]; then echo "::error::unguarded destructive DDL found:"; echo "$BAD"; exit 1; fi
          echo "safety_ok: no unguarded destructive DDL"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link staging project
        run: supabase link --project-ref "$STAGING_REF"

      - name: Dry-run diff (informational)
        run: supabase db diff --linked --schema public || true

      - name: Apply migrations (confirm=APPLY only)
        if: ${{ github.event.inputs.confirm == 'APPLY' }}
        run: supabase db push --include-all

      - name: Verify staging schema (confirm=APPLY only)
        if: ${{ github.event.inputs.confirm == 'APPLY' }}
        env:
          # GitHub-hosted runners are IPv4-only; the direct db.<ref>.supabase.co host
          # is now IPv6-only → "Network is unreachable". Use the IPv4 SESSION pooler
          # (the same endpoint `supabase db push` used). Staging is us-west-1; override
          # via the optional STAGING_DB_POOLER_HOST secret if the region ever changes.
          POOLER_HOST: ${{ secrets.STAGING_DB_POOLER_HOST || 'aws-1-us-west-1.pooler.supabase.com' }}
        run: |
          set -euo pipefail
          DB="postgresql://postgres.${STAGING_REF}:${SUPABASE_DB_PASSWORD}@${POOLER_HOST}:5432/postgres?sslmode=require"
          q(){ psql "$DB" -tAc "$1"; }
          q "select 1" >/dev/null   # connectivity probe — fail the step hard if unreachable
          echo "applied_migrations=$(q "select count(*) from supabase_migrations.schema_migrations;")"
          echo "public_tables=$(q "select count(*) from information_schema.tables where table_schema='public' and table_type='BASE TABLE';")"
          echo "rls_enabled_tables=$(q "select count(*) from pg_tables t join pg_class c on c.relname=t.tablename where t.schemaname='public' and c.relrowsecurity;")"
          echo "functions=$(q "select count(*) from information_schema.routines where routine_schema='public';")"
          echo "triggers=$(q "select count(*) from information_schema.triggers where trigger_schema='public';")"
          echo "indexes=$(q "select count(*) from pg_indexes where schemaname='public';")"
          echo "bucket_images=$(q "select coalesce((select case when public then 'PUBLIC' else 'private' end from storage.buckets where id='images'),'ABSENT');")"
          echo "verify_done (production ref ${PROD_REF} NEVER referenced as a connection in this job)"
