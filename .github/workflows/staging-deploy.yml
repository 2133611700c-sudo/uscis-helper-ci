name: Staging Deploy (manual)

# Builds + deploys a Vercel PREVIEW deployment wired to the ISOLATED staging Supabase
# (#160). A preview deploy NEVER touches Production (messenginfo.com) or the prod
# Supabase. All secrets stay in GitHub. Inert until dispatched with confirm=DEPLOY.
#
# RUNTIME ENV: the staging Supabase + HEALTH_TOKEN are passed to `vercel deploy` via
# --build-env (-b, build-time, e.g. NEXT_PUBLIC_*) and --env (-e, runtime, e.g. the
# server SUPABASE_* + HEALTH_TOKEN). A prebuilt deploy would NOT set server runtime
# env (that comes from the project's env settings), so we let Vercel build remotely
# with these per-deployment overrides instead. Other app env (GEMINI/Stripe/etc.)
# comes from the project's Preview env and is only needed for those features.
#
# Required secrets: VERCEL_TOKEN, STAGING_SUPABASE_PROJECT_REF, STAGING_SUPABASE_URL,
#   STAGING_SUPABASE_ANON_KEY, STAGING_SUPABASE_SERVICE_ROLE_KEY, HEALTH_TOKEN.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to build + deploy the staging preview'
        required: true
        default: 'dry-run'

permissions:
  contents: read

env:
  # Non-secret Vercel identifiers for the uscis-helper project.
  VERCEL_ORG_ID: team_qRGWLc9kKWuiKWouVsOeO1P4
  VERCEL_PROJECT_ID: prj_G5Bwd5VMDqEMdbPKLlQW50aF3pQq
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  PROD_REF: rtfxrlountkoegsseukx
  STAGING_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
  STAGING_URL: ${{ secrets.STAGING_SUPABASE_URL }}
  STAGING_ANON: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
  STAGING_SR: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
  HEALTH_TOKEN: ${{ secrets.HEALTH_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guards — secrets present, staging != prod, URL matches staging ref
        run: |
          set -euo pipefail
          for v in VERCEL_TOKEN STAGING_REF STAGING_URL STAGING_ANON STAGING_SR HEALTH_TOKEN; do
            eval "val=\${$v:-}"; [ -n "$val" ] || { echo "::error::secret $v missing"; exit 1; }
          done
          [ "$STAGING_REF" != "$PROD_REF" ] || { echo "::error::staging ref == prod ref"; exit 1; }
          echo "$STAGING_URL" | grep -q "$STAGING_REF" || { echo "::error::STAGING_SUPABASE_URL does not contain the staging ref"; exit 1; }
          if echo "$STAGING_URL" | grep -q "$PROD_REF"; then echo "::error::staging URL contains the prod ref"; exit 1; fi
          echo "guards_ok"

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - run: npm i -g vercel@latest

      - name: Deploy PREVIEW with staging runtime env (confirm=DEPLOY only)
        if: ${{ github.event.inputs.confirm == 'DEPLOY' }}
        id: deploy
        run: |
          set -euo pipefail
          # Vercel builds remotely (NOT prebuilt) so -e applies to the server runtime.
          # -b = build-time (NEXT_PUBLIC_* inlining), -e = runtime (server process.env).
          URL=$(vercel deploy --yes --token="$VERCEL_TOKEN" \
            -b NEXT_PUBLIC_SUPABASE_URL="$STAGING_URL"        -e NEXT_PUBLIC_SUPABASE_URL="$STAGING_URL" \
            -b NEXT_PUBLIC_SUPABASE_ANON_KEY="$STAGING_ANON"  -e NEXT_PUBLIC_SUPABASE_ANON_KEY="$STAGING_ANON" \
            -e SUPABASE_URL="$STAGING_URL" \
            -e SUPABASE_SERVICE_ROLE_KEY="$STAGING_SR" \
            -e HEALTH_TOKEN="$HEALTH_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "staging_url=$URL"

      - name: Smoke + runtime staging proof (confirm=DEPLOY only)
        if: ${{ github.event.inputs.confirm == 'DEPLOY' }}
        env:
          UA: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36'
        run: |
          # -u/-o pipefail but NOT -e — grep is used for control flow below.
          set -uo pipefail
          URL="${{ steps.deploy.outputs.url }}"
          echo "deployed: $URL"

          # 1) LIVENESS — /api/healthz (UA-exempt). Must be a PREVIEW deployment.
          ok=no
          for i in $(seq 1 25); do
            code=$(curl -s -A "$UA" -o /tmp/hz -w '%{http_code}' "$URL/api/healthz" || true)
            if [ "$code" = "200" ]; then ok=yes; break; fi
            sleep 6
          done
          if [ "$ok" != "yes" ]; then echo "::error::healthz never returned 200"; cat /tmp/hz 2>/dev/null || true; exit 1; fi
          echo "healthz=$(cat /tmp/hz)"
          if ! grep -q '"status":"ok"' /tmp/hz; then echo "::error::healthz status not ok"; exit 1; fi
          if ! grep -q '"environment":"preview"' /tmp/hz; then echo "::error::not a preview deployment (production must never be the target)"; exit 1; fi

          # 2) RUNTIME DB PROOF — the token-gated deep /api/health connects to the
          #    deployment's CONFIGURED Supabase (the staging one passed via -e) and
          #    reads its tables. 200 ⇒ the running server talks to staging Postgres.
          hcode=$(curl -s -A "$UA" -H "x-health-token: $HEALTH_TOKEN" -o /tmp/health -w '%{http_code}' "$URL/api/health" || true)
          echo "deep_health_code=$hcode"
          echo "deep_health_body=$(head -c 500 /tmp/health 2>/dev/null)"
          if [ "$hcode" != "200" ]; then echo "::error::deep /api/health != 200 — runtime DB connection to staging NOT proven"; exit 1; fi

          # 3) ISOLATION — the staging Supabase URL/keys are the ONLY ones passed to
          #    this deployment; production messenginfo.com is a separate deployment and
          #    is never the target of a preview deploy. Guards already asserted the
          #    staging URL carries the staging ref and not the prod ref.
          echo "smoke_ok url=$URL (preview ✓ · deep-health 200 ✓ · staging-only env ✓)"
