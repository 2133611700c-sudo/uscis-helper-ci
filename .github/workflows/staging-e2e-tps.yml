name: Staging E2E — TPS (manual)

# Deploys a fresh Vercel PREVIEW wired to staging Supabase (#160), then runs the
# TPS browser E2E (no-OCR manual path, synthetic data, no PII) against it. Production
# is never the target. All secrets stay in GitHub. Inert until dispatched.
#
# Required secrets: VERCEL_TOKEN, STAGING_SUPABASE_PROJECT_REF, STAGING_SUPABASE_URL,
#   STAGING_SUPABASE_ANON_KEY, STAGING_SUPABASE_SERVICE_ROLE_KEY, HEALTH_TOKEN.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  VERCEL_ORG_ID: team_qRGWLc9kKWuiKWouVsOeO1P4
  VERCEL_PROJECT_ID: prj_G5Bwd5VMDqEMdbPKLlQW50aF3pQq
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  PROD_REF: rtfxrlountkoegsseukx
  STAGING_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
  STAGING_URL: ${{ secrets.STAGING_SUPABASE_URL }}
  STAGING_ANON: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
  STAGING_SR: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
  HEALTH_TOKEN: ${{ secrets.HEALTH_TOKEN }}
  # Owner-gated Generate flow (forged __owner_session cookie). Same secret is injected
  # into the deployment (so the server verifies the cookie) AND passed to Playwright
  # (so it signs an identical cookie). Empty ⇒ the owner test self-skips.
  OWNER_SESSION_SECRET: ${{ secrets.OWNER_SESSION_SECRET }}
  OWNER_EMAILS: ${{ secrets.OWNER_EMAILS }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Guards — secrets present, staging != prod
        run: |
          set -euo pipefail
          for v in VERCEL_TOKEN STAGING_REF STAGING_URL STAGING_ANON STAGING_SR HEALTH_TOKEN; do
            eval "val=\${$v:-}"; [ -n "$val" ] || { echo "::error::secret $v missing"; exit 1; }
          done
          [ "$STAGING_REF" != "$PROD_REF" ] || { echo "::error::staging ref == prod ref"; exit 1; }
          echo "$STAGING_URL" | grep -q "$STAGING_REF" || { echo "::error::staging URL missing staging ref"; exit 1; }
          if echo "$STAGING_URL" | grep -q "$PROD_REF"; then echo "::error::staging URL has prod ref"; exit 1; fi
          echo guards_ok

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npm i -g vercel@latest
      - run: npx playwright install --with-deps chromium

      - name: Deploy fresh staging PREVIEW (staging runtime env)
        id: deploy
        run: |
          set -euo pipefail
          URL=$(vercel deploy --yes --token="$VERCEL_TOKEN" \
            -b NEXT_PUBLIC_SUPABASE_URL="$STAGING_URL"        -e NEXT_PUBLIC_SUPABASE_URL="$STAGING_URL" \
            -b NEXT_PUBLIC_SUPABASE_ANON_KEY="$STAGING_ANON"  -e NEXT_PUBLIC_SUPABASE_ANON_KEY="$STAGING_ANON" \
            -e SUPABASE_URL="$STAGING_URL" \
            -e SUPABASE_SERVICE_ROLE_KEY="$STAGING_SR" \
            -e HEALTH_TOKEN="$HEALTH_TOKEN" \
            -e OWNER_SESSION_SECRET="$OWNER_SESSION_SECRET" \
            -e OWNER_EMAILS="$OWNER_EMAILS")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "staging_url=$URL"

      - name: Wait for staging healthz (preview)
        env:
          UA: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36'
        run: |
          set -uo pipefail
          URL="${{ steps.deploy.outputs.url }}"
          for i in $(seq 1 25); do
            code=$(curl -s -A "$UA" -o /tmp/hz -w '%{http_code}' "$URL/api/healthz" || true)
            [ "$code" = "200" ] && break
            sleep 6
          done
          cat /tmp/hz 2>/dev/null; echo
          grep -q '"environment":"preview"' /tmp/hz || { echo "::error::staging not a preview deployment"; exit 1; }

      - name: TPS golden-path E2E (no-OCR, synthetic) + owner-gated generate
        env:
          E2E_BASE_URL: ${{ steps.deploy.outputs.url }}
        run: npx playwright test tests/e2e-ui/tps-golden-path.spec.ts

      - name: PDF visual acceptance (render + check each scenario packet)
        if: always()
        run: |
          set -uo pipefail
          shopt -s nullglob
          mkdir -p tps-artifacts   # the dir may not exist yet when owner tests are skipped
          zips=(tps-artifacts/*.zip)
          if [ ${#zips[@]} -eq 0 ]; then
            echo "::warning::no packet ZIP produced (owner tests likely skipped — secrets absent); no PDF acceptance"
            echo '{"status":"no_zip_owner_tests_skipped"}' > tps-artifacts/visual-acceptance.json
            exit 0
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils jq
          echo '{"scenarios":[]}' > tps-artifacts/visual-acceptance.json
          overall_ok=1
          for ZIP in "${zips[@]}"; do
            scen=$(basename "$ZIP" .zip)        # scenario-a | scenario-b
            outdir="tps-artifacts/${scen}"
            mkdir -p "$outdir/render"
            unzip -o "$ZIP" -d "$outdir/packet" >/dev/null
            echo "── $scen files ──"; ls -1 "$outdir/packet"
            # Expect I-821 in both; I-765 only in scenario-b (EAD path).
            expect_i765="no"; [ "$scen" = "scenario-b" ] && expect_i765="yes"
            i821="absent"; i765="absent"
            files_json="[]"
            for p in "$outdir/packet"/*.pdf; do
              [ -e "$p" ] || continue
              base=$(basename "$p")
              pages=$(pdfinfo "$p" 2>/dev/null | awk '/^Pages:/{print $2}'); pages=${pages:-0}
              text=$(pdftotext "$p" - 2>/dev/null || true)
              name_present=no; echo "$text" | grep -qi "SHEVCHENKO" && name_present=yes
              pdftoppm -png -r 110 "$p" "$outdir/render/${base%.pdf}-page" >/dev/null 2>&1 || true
              rendered=$(ls "$outdir/render/${base%.pdf}-page"*.png 2>/dev/null | wc -l | tr -d ' ')
              # A page renders + has ≥1 page + the synthetic surname is on the form ⇒ pass.
              verdict="fail"; { [ "$pages" -ge 1 ] && [ "$rendered" -ge 1 ] && [ "$name_present" = "yes" ]; } && verdict="pass"
              [ "$verdict" = "pass" ] || overall_ok=0
              echo "  $base pages=$pages rendered=$rendered name_present=$name_present verdict=$verdict"
              echo "$base" | grep -qiE "i.?821" && i821="$verdict"
              echo "$base" | grep -qiE "i.?765" && i765="$verdict"
              files_json=$(echo "$files_json" | jq --arg f "$base" --argjson pg "$pages" --argjson rn "$rendered" --arg np "$name_present" --arg v "$verdict" '. += [{file:$f,pages:$pg,rendered:$rn,name_present:$np,verdict:$v}]')
            done
            # Required-presence checks.
            [ "$i821" = "pass" ] || { echo "::error::$scen: I-821 not present/valid"; overall_ok=0; }
            if [ "$expect_i765" = "yes" ] && [ "$i765" != "pass" ]; then echo "::error::$scen: I-765 expected but not present/valid"; overall_ok=0; fi
            [ "$expect_i765" = "no" ] && i765="not_applicable"
            jq --arg s "$scen" --arg a "$i821" --arg b "$i765" --argjson fl "$files_json" \
               '.scenarios += [{scenario:$s, i821_visual:$a, i765_visual:$b, files:$fl}]' \
               tps-artifacts/visual-acceptance.json > /tmp/va.json && mv /tmp/va.json tps-artifacts/visual-acceptance.json
          done
          echo "=== visual-acceptance.json ==="; cat tps-artifacts/visual-acceptance.json
          [ "$overall_ok" = "1" ] || { echo "::error::PDF visual acceptance FAILED"; exit 1; }
          echo "pdf_visual_acceptance=PASS"

      - name: Upload Playwright + packet artifacts (PII-free synthetic)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tps-e2e-report
          path: |
            playwright-report/
            test-results/
            tps-artifacts/
          if-no-files-found: ignore
          retention-days: 7
