name: Staging E2E — EAD (manual)

# Deploys a fresh Vercel PREVIEW wired to staging Supabase, then runs the EAD
# (I-765) browser E2E (manual path, synthetic data, no PII) against it and
# validates the downloaded filled I-765 PDF. EAD is FREE — no owner/payment
# secrets needed. Production is never the target. Inert until dispatched.
#
# Required secrets: VERCEL_TOKEN, STAGING_SUPABASE_PROJECT_REF, STAGING_SUPABASE_URL,
#   STAGING_SUPABASE_ANON_KEY, STAGING_SUPABASE_SERVICE_ROLE_KEY, HEALTH_TOKEN.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  VERCEL_ORG_ID: team_qRGWLc9kKWuiKWouVsOeO1P4
  VERCEL_PROJECT_ID: prj_G5Bwd5VMDqEMdbPKLlQW50aF3pQq
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  PROD_REF: rtfxrlountkoegsseukx
  STAGING_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
  STAGING_URL: ${{ secrets.STAGING_SUPABASE_URL }}
  STAGING_ANON: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
  STAGING_SR: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
  HEALTH_TOKEN: ${{ secrets.HEALTH_TOKEN }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Guards — secrets present, staging != prod
        run: |
          set -euo pipefail
          for v in VERCEL_TOKEN STAGING_REF STAGING_URL STAGING_ANON STAGING_SR HEALTH_TOKEN; do
            eval "val=\${$v:-}"; [ -n "$val" ] || { echo "::error::secret $v missing"; exit 1; }
          done
          [ "$STAGING_REF" != "$PROD_REF" ] || { echo "::error::staging ref == prod ref"; exit 1; }
          echo "$STAGING_URL" | grep -q "$STAGING_REF" || { echo "::error::staging URL missing staging ref"; exit 1; }
          if echo "$STAGING_URL" | grep -q "$PROD_REF"; then echo "::error::staging URL has prod ref"; exit 1; fi
          echo guards_ok

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npm i -g vercel@latest
      - run: npx playwright install --with-deps chromium

      - name: Deploy fresh staging PREVIEW (staging runtime env)
        id: deploy
        run: |
          set -euo pipefail
          URL=$(vercel deploy --yes --token="$VERCEL_TOKEN" \
            -b NEXT_PUBLIC_SUPABASE_URL="$STAGING_URL"        -e NEXT_PUBLIC_SUPABASE_URL="$STAGING_URL" \
            -b NEXT_PUBLIC_SUPABASE_ANON_KEY="$STAGING_ANON"  -e NEXT_PUBLIC_SUPABASE_ANON_KEY="$STAGING_ANON" \
            -e SUPABASE_URL="$STAGING_URL" \
            -e SUPABASE_SERVICE_ROLE_KEY="$STAGING_SR" \
            -e HEALTH_TOKEN="$HEALTH_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "staging_url=$URL"

      - name: Wait for staging healthz (preview)
        env:
          UA: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36'
        run: |
          set -uo pipefail
          URL="${{ steps.deploy.outputs.url }}"
          for i in $(seq 1 25); do
            code=$(curl -s -A "$UA" -o /tmp/hz -w '%{http_code}' "$URL/api/healthz" || true)
            [ "$code" = "200" ] && break
            sleep 6
          done
          cat /tmp/hz 2>/dev/null; echo
          grep -q '"environment":"preview"' /tmp/hz || { echo "::error::staging not a preview deployment"; exit 1; }

      - name: EAD golden-path E2E (manual, synthetic) → real I-765 PDF
        env:
          E2E_BASE_URL: ${{ steps.deploy.outputs.url }}
        run: npx playwright test tests/e2e-ui/ead-golden-path.spec.ts

      - name: Staging ref proof (staging used, prod untouched)
        run: |
          set -euo pipefail
          [ "$STAGING_REF" = "rxnlpvldngxgdxkxoaaj" ] || { echo "::error::staging_ref != expected rxnlpvldngxgdxkxoaaj"; exit 1; }
          [ "$STAGING_REF" != "$PROD_REF" ] || { echo "::error::staging_ref equals prod"; exit 1; }
          echo "staging_ref_matches_expected=yes"
          echo "production_ref_used=no (prod ${PROD_REF} never used as a connection in this job)"

      - name: PDF visual acceptance (render + HARD field-level checks)
        if: always()
        env:
          EXPECTED_PAGES: '7'   # I-765 edition 08/21/25
        run: |
          set -uo pipefail
          shopt -s nullglob
          mkdir -p ead-artifacts ead-artifacts/render
          PDF=ead-artifacts/i765-new.pdf
          if [ ! -f "$PDF" ]; then
            echo "::error::no I-765 PDF produced by the EAD E2E (must be downloaded via the UI, not a direct API call)"
            echo '{"status":"no_pdf"}' > ead-artifacts/visual-acceptance.json
            exit 1
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils jq
          python3 -m pip install --quiet pypdf

          # ── Structural: page count + render every page; a blank/missing page
          #    renders to a tiny PNG, so >3KB per page guards against missing pages.
          pages=$(pdfinfo "$PDF" 2>/dev/null | awk '/^Pages:/{print $2}'); pages=${pages:-0}
          pdftoppm -png -r 110 "$PDF" "ead-artifacts/render/i765-page" >/dev/null 2>&1 || true
          rendered=$(ls ead-artifacts/render/i765-page*.png 2>/dev/null | wc -l | tr -d ' ')
          tiny=$(find ead-artifacts/render -name 'i765-page*.png' -size -3k | wc -l | tr -d ' ')
          # pdftotext must succeed (non-empty) — proves the text layer is intact.
          text_len=$(pdftotext "$PDF" - 2>/dev/null | wc -c | tr -d ' ')
          echo "pages=$pages rendered=$rendered tiny_pngs=$tiny text_len=$text_len expected_pages=$EXPECTED_PAGES"

          # ── Field-level (pypdf): exact AcroForm values, no fragile text grep.
          python3 - "$PDF" > ead-artifacts/fields.json <<'PY'
          import sys, json
          from pypdf import PdfReader
          r = PdfReader(sys.argv[1])
          f = r.get_fields() or {}
          def v(sub):
              for name, fld in f.items():
                  if sub in name:
                      val = fld.get('/V')
                      if val in (None, '/Off'):
                          return ''
                      s = str(val)
                      return s[1:] if s.startswith('/') else s  # strip leading checkbox slash, keep date slashes
              return None
          out = {
            "family_name": v("FamilyName"),
            "given_name": v("GivenName"),
            "dob": v("Line19_DOB") or v("DOB"),
            "category_letter": v("section_1"),
            "category_number": v("section_2"),
            "apptype_new_checked": bool(v("Part1_Checkbox[0]")),
            "address": v("Line4b"),
            "a_number": v("AlienNumber"),
            "signature": v("Signature"),
          }
          print(json.dumps(out))
          PY
          cat ead-artifacts/fields.json
          F=ead-artifacts/fields.json
          jqget(){ jq -r "$1 // \"\"" "$F"; }
          fam=$(jqget .family_name); giv=$(jqget .given_name); dob=$(jqget .dob)
          cl=$(jqget .category_letter); cn=$(jqget .category_number)
          appnew=$(jqget .apptype_new_checked); addr=$(jqget .address)
          anum=$(jqget .a_number); sig=$(jqget .signature)

          ok=1; fails=""
          chk(){ if [ "$2" = "1" ]; then echo "  ✓ $1"; else echo "  ✗ $1"; ok=0; fails="$fails $1"; fi; }
          chk "page_count==$EXPECTED_PAGES"        "$([ "$pages" = "$EXPECTED_PAGES" ] && echo 1)"
          chk "all_pages_rendered"                 "$([ "$rendered" = "$pages" ] && [ "$pages" -ge 1 ] && echo 1)"
          chk "no_missing_blank_pages"             "$([ "$tiny" = "0" ] && echo 1)"
          chk "text_layer_nonempty"                "$([ "$text_len" -gt 100 ] && echo 1)"
          chk "family_name=Shevchenko"             "$(echo "$fam" | grep -qi 'shevchenko' && echo 1)"
          chk "given_name=Taras"                   "$(echo "$giv" | grep -qi 'taras' && echo 1)"
          chk "dob=01/15/1990"                     "$(echo "$dob" | grep -q '1990' && echo "$dob" | grep -q '15' && echo 1)"
          chk "category_letter=a"                  "$([ "$cl" = "a" ] && echo 1)"
          chk "category_number=12"                 "$([ "$cn" = "12" ] && echo 1)"
          chk "apptype_new_checked"                "$([ "$appnew" = "true" ] && echo 1)"
          chk "address_present"                    "$(echo "$addr" | grep -qi 'main st' && echo 1)"
          chk "a_number_blank"                     "$([ -z "$anum" ] && echo 1)"
          chk "signature_blank"                    "$([ -z "$sig" ] && echo 1)"

          verdict="fail"; [ "$ok" = "1" ] && verdict="pass"
          jq -n --argjson pg "$pages" --argjson rn "$rendered" --argjson tn "$tiny" \
                --slurpfile fields "$F" --arg v "$verdict" --arg fails "$fails" \
                --arg sref "$STAGING_REF" --arg pref "$PROD_REF" \
            '{i765: {pages:$pg, rendered:$rn, tiny_pngs:$tn, fields:$fields[0], verdict:$v,
              failed_checks:($fails|ltrimstr(" ")),
              clipping_overlap:"render_nonblank_proxy_only (no vision model available)",
              staging_ref_matches:($sref=="rxnlpvldngxgdxkxoaaj"), production_ref_used:false}}' \
            > ead-artifacts/visual-acceptance.json
          echo "=== visual-acceptance.json ==="; cat ead-artifacts/visual-acceptance.json
          [ "$verdict" = "pass" ] || { echo "::error::EAD PDF acceptance FAILED:$fails"; exit 1; }
          echo "EAD_PDF_VISUAL_ACCEPTANCE=PASS"

      - name: Upload Playwright + packet artifacts (PII-free synthetic)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ead-e2e-report
          path: |
            playwright-report/
            test-results/
            ead-artifacts/
          if-no-files-found: ignore
          retention-days: 7
