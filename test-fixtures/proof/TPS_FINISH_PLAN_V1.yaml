# ── DEFINITION OF DONE ──────────────────────────────────────────────────────
done_criteria:
  controlled_beta_ready:
    - "Phase A complete (4 commits в prod, Vercel READY, live verify)"
    - "Phase B complete (legal-risk, manual fallback, i18n, edition guard, повторить-fix, Re-Parole streaming)"
    - "Phase C complete (1 real document end-to-end success)"
    - "Phase E.1, E.4 complete (health endpoint, cost controls)"
    - "Phase F complete (README + privacy + landing copy + final YAML)"
    - "No critical privacy finding outstanding"

  public_beta_ready:
    - "controlled_beta_ready"
    - "3-5 настоящих юзеров прошли flow"
    - "Найденные баги починены или явно tracked"
    - "Phase D done (Re-Parole at TPS parity if shipping both)"
    - "Phase E.2 (Telegram daily summary), E.3 (Sentry test) complete"

  paid_launch_ready:
    - "public_beta_ready"
    - "Phase G complete OR scoped-down version of G.1+G.3+G.5"
    - "Business: pricing decided, Stripe live, refund policy written"
    - "Legal: terms of service updated, no UPL claim"

