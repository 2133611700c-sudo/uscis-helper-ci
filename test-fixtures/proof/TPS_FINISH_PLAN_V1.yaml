explicit_cuts:
  - id: CUT-1
    item: "Stripe / payments / refund policy"
    why: "Business+legal decision, not engineering. Делать после первого пилота с настоящими пользователями. До этого никаких платных функций."
  - id: CUT-2
    item: "Service Engine extraction refactor"
    why: "TPS + Re-Parole уже делят lib/tps/transliterate, pdfPrefiller, OCR modules de facto. Формальный рефакторинг без третьего сервиса — риск регрессии ради чистоты, не ради пользователя."
  - id: CUT-3
    item: "Playwright E2E в CI"
    why: "Vitest packet-builder fixture-тесты уже ловят prod-class баги (XFA, encryption, instanceof, WinAnsi). Playwright нужен после стабильного UI и 3-5 реальных пользователей. До этого он будет ломаться чаще, чем ловить."
  - id: CUT-4
    item: "I-912 fee waiver autofill"
    why: "Scope creep. Юзер может попросить I-912 явно после controlled beta. Tools/data ready (i-912.pdf inventoried), но wiring это P2."
  - id: CUT-5
    item: "Attorney / DOJ-accredited referral path (формальная)"
    why: "Контракт с настоящей immigration юр. фирмой/DOJ-accredited rep — это business deal, не код. До этого: текст 'this may require legal review' уже достаточен, ничего больше не обещаем."
  - id: CUT-6
    item: "Full WCAG 2.1 AA audit с axe-core"
    why: "Делаем focused manual check (keyboard, contrast, screen-reader landmarks) в F.3. Full automated audit — после первых пользователей."
  - id: CUT-7
    item: "User accounts / save-and-continue через Supabase Auth"
    why: "Пока localStorage достаточно для одной сессии. Supabase save-and-continue добавляет attack surface и retention bugs. Делать тогда, когда реальные пользователи попросят."

