phase_B:
  title: "TPS-CORE COMPLETENESS"
  status: PENDING_PHASE_A
  goal: "Закрыть оставшиеся inline gaps в TPS pipeline — legal-risk, manual fallback, output contract, i18n, README accuracy"
  est_total_hours: 9
  gate:
    - "5 commits зашиты, push'нуты, Vercel READY"
    - "Live browser smoke каждой новой surface проходит"
    - "Content guards + typecheck + i18n drift script все green"
  tasks:
    - id: B.1
      task: "CB.2 — Legal-risk routing UI surface"
      owner: me
      hours: 3
      detail: |
        Существующие поля в TPSAnswers: has_criminal_concern, has_prior_tps_denial,
        left_us_without_advance_parole. Сейчас никто их не выставляет — генерация
        идёт с false по умолчанию. Добавить:
          - 3 yes/no вопроса перед attestation в GeneratePacketBlock
          - При любом 'yes' показать notice:
            ru: "Это может требовать консультации иммиграционного адвоката.
                 Messenginfo — не юридическая фирма."
          - НЕ блокировать генерацию — это юзерское решение
          - data-testid: legal-risk-criminal, legal-risk-denial, legal-risk-ap, legal-risk-notice
          - Перевести uk/ru/en/es
      blocker: no
    - id: B.2
      task: "CB.3 — Manual fallback в TPS upload"
      owner: me
      hours: 2
      detail: |
        manual_review_queue таблица + admin queue уже built (phases 1-15 из старого
        backlog). Не перестраиваем — wire-up:
          - В DocumentUploadScreen: при failed OCR / image_quality reject — кнопка
            'Нужна помощь — отправить на ручную проверку'
          - В SelfReviewScreen: 'Я не уверен — отправить на ручную проверку'
          - Создать строку в manual_review_queue через существующий endpoint
            (или новый /api/tps/manual-review если необходимо)
          - НЕ загружать изображение в Supabase storage из этого пути — только
            session_id + что не получилось + контакт юзера (email)
        Privacy: контакт юзера — это email, не файл.
      blocker: no
    - id: B.3
      task: "CB.4 — Output contract drift audit"
      owner: me
      hours: 1
      method: "Agent run: сравнить promised content в (a) PacketCompletenessChecker (b) README.txt generator (c) landing page tpsHowSteps copy. Drift → fix к single source of truth (forms_manifest.json)."
      blocker: no
    - id: B.4
      task: "CB.5 — i18n drift guard script"
      owner: me
      hours: 1
      detail: |
        Скрипт в scripts/check-i18n-drift.mjs:
          - Парсит COPY объекты в каждом .tsx файле с locale='ru'|'uk'|'en'|'es'
          - Для каждого ключа проверяет что все 4 локали имеют значение
          - Для non-EN локалей: warn если строка содержит >= 3 чисто-латинских слов
            подряд (за исключением whitelist: I-821, I-765, USCIS, EAD, ZIP, PDF...)
          - Wire в package.json scripts: 'guard:i18n'
        Fail-list на сегодня: вероятно 0-5 драйфтов.
      blocker: no
    - id: B.5
      task: "CB.6 — Source snapshot date + edition drift guard"
      owner: me
      hours: 1
      detail: |
        - README.txt generator (packetBuilder) читает forms_manifest.json и пишет
          в README: 'I-821 Edition 01/20/25 (snapshot 2026-05-10), I-765 Edition
          08/21/25 (snapshot 2026-05-10)'
        - Существующий vitest 'forms manifest edition drift guard' уже падает
          если edition_match != current_from_official_page — оставляем как есть
        - Добавить hash самого PDF в forms_manifest.json и runtime-check при
          packetBuilder загрузке. Если SHA256 PDF не совпадает с pinned —
          throw 'Form PDF tampered'.
      blocker: no
    - id: B.6
      task: "RUN.5 — Fix 'Повторить' cycle behaviour"
      owner: me
      hours: 1
      detail: "Pending в legacy backlog — выяснить symptom, починить, тест"
      blocker: no
    - id: B.7
      task: "SP-1 root fix — Re-Parole streaming response"
      owner: me
      hours: 2
      detail: |
        Сейчас Re-Parole /api/packet/generate грузит filled ZIP в Supabase Storage
        и отдаёт signed URL. CB.1 cron теперь подметает старые объекты, но root
        fix — это вообще не писать в storage. Переключить на streaming response
        как у TPS:
          return new NextResponse(zipBytes, {
            headers: { 'Content-Type': 'application/zip',
                       'Content-Disposition': 'attachment; filename=...' }
          })
        Снять Supabase upload вызов. Снять signed URL логику. Обновить wizard UI
        чтобы download был прямой blob URL.
      blocker: no
      risk: "Может сломать существующий Re-Parole flow если у юзеров есть открытые signed URLs. Mitigation: оставить signed-URL endpoint работающим 7 дней после deploy, новые сессии используют streaming."
    - id: B.8
      task: "Commit + push + Vercel READY + live verify фазы B"
      owner: "me + mac"
      hours: "0.5 + 0.2"

