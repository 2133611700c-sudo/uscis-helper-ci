    name: TPS_REAL_USER_PILOT
    priority: P0
    depends_on: nothing — can start tomorrow
    duration: "1-2 days actual work + 1 week real-user wait"
    why_first: |
      Every other improvement is building on the assumption that
      passport OCR works on real photos. We don't know that yet.
      One real passport test buys more confidence than 4 days of
      I-94/EAD work on top of an unverified foundation.

  cycle_2_option_a:
    name: TPS_QUICK_WINS
    priority: P0
    duration: "0.5 day"
    scope:
      - B5 phone normalization (30 min)
      - C3 i18n drift check (2 hours)
      - KG2/3 better blur detection + UI hint (2 hours)
    why: "Cheap, removes noise before bigger work."

  cycle_3:
    name: TPS_I94_EAD_OCR_ROUTING
    priority: P0
    depends_on: TPS_REAL_USER_PILOT or operator decision to defer
    duration: "3-4 days"
    why: |
      You wanted this originally and it makes the product
      "really useful" for re-registration users. Skip if pilot
      reveals fundamental OCR issues.

  cycle_4:
    name: TPS_PACKET_COMPLETENESS_CHECKER
    priority: P0
    depends_on: cycle_3
    duration: "2 days"

  cycle_5:
    name: TPS_TELEMETRY_AND_E2E
    priority: P1
    depends_on: nothing — could run in parallel
    duration: "2-3 days"

# ════════════════════════════════════════════════════════════════════════════
# WHAT I'D ACTUALLY DO IF I WERE YOU
# ════════════════════════════════════════════════════════════════════════════

if_I_were_operator: |
  1. Take ONE photo of your own UA passport on iPhone in normal indoor
     light. Don't sanitize the image, don't redact MRZ — that's the
     point. Upload via the live wizard at messenginfo.com/ru/services/
     tps-ukraine/start (you can delete the doc_id from logs after).
     Tell me if matched=true and review screen looks correct. 10 min.

  2. If it works → run TPS_QUICK_WINS (phone normalization + i18n drift
     check + blur UI hint) in one cycle. ~4 hours.

  3. Then TPS_I94_EAD_OCR_ROUTING as planned. ~3-4 days.

  4. Then packet completeness checker.

  5. Then real pilot with 3-5 friends/family (NDA).

  If step 1 fails on your own photo, we don't move to step 2 yet —
  we fix OCR robustness first.

