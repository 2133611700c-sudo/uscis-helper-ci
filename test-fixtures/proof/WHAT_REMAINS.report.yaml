report: WHAT_REMAINS_BEFORE_REAL_TPS_PRODUCT
generated_at: "2026-05-11T07:25Z"
honesty_level: "no embellishment, no rounding up"

# ── HOW TO READ THIS ────────────────────────────────────────────────────────
# Items are grouped by what they UNBLOCK, not by how big they are.
# Each item has:
#   severity   how badly it blocks paid_launch
#   readiness  0-100% — what fraction is already done
#   effort     rough scope (hours)
#   risk       what can go wrong
#   blocks     what depends on this

# ════════════════════════════════════════════════════════════════════════════
# CATEGORY A — UNVERIFIED ASSUMPTIONS (block real-user launch)
# ════════════════════════════════════════════════════════════════════════════

A1_real_user_pilot:
  severity: HIGH
  readiness: 0
  effort_hours: 4-8 (plus 1 week wait for USCIS receipt)
  description: |
    No real Ukrainian passport has ever been tested end-to-end.
    20 synthetic-degraded variants tested; 11 survived. But "blurry
    synthetic" ≠ "real phone photo of real passport in real lighting".
  blocks:
    - paid_launch
    - confidence that this product actually works
  risk: |
    Synthetic MRZ has perfectly even font kerning and contrast. Real
    passports have wear, security overlays, RFID-induced print artifacts.
    Vision could fail on details we cannot simulate.
  next_action: |
    Single passport test on your phone, EXIF metadata stripped before
    upload, delete fixture after test. Or 3-5 friends/family under NDA.

A2_real_phone_photo_robustness_gap:
  severity: MEDIUM-HIGH
  readiness: 55  # 11/20 degraded variants pass
  effort_hours: 8-16
  description: |
    Rotation ≥15° kills MRZ extraction. 600/1000px downscales fail
    while 300px works. These are common phone-photo failure modes.
  proposed_fix: |
    (a) Add image deskew in preprocess (sharp.rotate + auto-orient)
    (b) Add Laplacian variance blur detector (too_blurry code is
        declared but never emitted)
    (c) UI hint on upload: "Hold phone flat, no glare"
  blocks: A1 confidence

A3_PII_persistence_proof:
  severity: MEDIUM
  readiness: 70  # code-audited PASS, but no automated guard
  effort_hours: 4
  description: |
    Banner says "files deleted after packet generation". The route
    code is clean (no fs.writeFile, no module-scope cache). But:
      - Vercel function logs may capture file metadata
      - No automated test enforces "buffer never crosses to logger"
      - No retention policy doc for the user
  proposed_fix: |
    (a) Add a lint rule / unit test that fails if any code path can
        log image buffer
    (b) Add user-facing privacy page section explaining retention
    (c) Optional Supabase audit table for upload events (count only,
        no payloads) — Supabase MCP tools were surfaced this session

# ════════════════════════════════════════════════════════════════════════════
# CATEGORY B — INCOMPLETE FEATURES (block "full TPS product")
# ════════════════════════════════════════════════════════════════════════════

B1_i94_ocr_routing:
  severity: MEDIUM
  readiness: 50
  effort_hours: 4-6
  description: |
    runI94Module() exists, returns i94_admission_number + last_entry_date
    + class_of_admission. But these don't reach the prefiller — currently
    only the passport module's fields seed Step 6.
  proposed_fix: |
    Extend GeneratePacketBlock.applyPreExtracted whitelist to include
    i94_admission_number + last_entry_date. Verify via roundtrip test.
  blocks: "Real packet completeness when user has I-94 paper"

B2_ead_ocr_routing:
  severity: MEDIUM
  readiness: 50
  effort_hours: 4-6
  description: |
    runEadModule() returns a_number + ead_category + ead_expiration_date.
    None reach I-765 prefiller. So a user who already has a TPS EAD and
    is re-applying types these by hand instead of OCR-ing from the card.
  proposed_fix: |
    Add a_number routing to I-765 Line5 (A-Number) and ead_category to
    the category section. New unit tests for the prefiller.

B3_i912_fee_waiver_autofill:
  severity: MEDIUM
  readiness: 0
  effort_hours: 8-12
  description: |
    Fee waiver path exists in wizard answers (wants_fee_waiver) but no
    I-912 PDF generation. User who needs fee waiver gets I-821+I-765
    ZIP plus a note "fill I-912 yourself".
  proposed_fix: |
    Build i912FieldMap.ts, include in ZIP when wants_fee_waiver=true.
    Add household income / means-tested benefit question to wizard.

B4_packet_completeness_checker:
  severity: MEDIUM
  readiness: 35  # README has lockbox+fee now, but no pre-download checklist
  effort_hours: 6-8
  description: |
    Currently a user can hit Generate with key fields missing and get
    a 422 with an unstyled list. Should be a pre-download checklist
    screen with green checkmarks and "fill this" hints.
  proposed_fix: |
    New step between Step 6 form and ZIP download:
      ✓ Identity (5 fields)
      ✓ US address (4 fields)
      ✓ Last entry date
      ✗ Phone or email missing
      → Fill these to generate the packet.

B5_phone_number_normalization:
  severity: LOW
  readiness: 0
  effort_hours: 0.5
  description: |
    Surfaced by the T6 fix: I-765 Pt3Line3_DaytimePhoneNumber1 has
    maxLength=10 (digits-only). We send "555-555-5555" (12 chars).
    Field is skipped.
  proposed_fix: |
    In i765FieldMap, strip non-digits from daytime_phone before
    setText. One-line fix.

B6_field_map_full_audit:
  severity: LOW-MEDIUM
  readiness: 60
  effort_hours: 12-20
  description: |
    Only ~32 of 511 I-821 fields and ~20 of 180 I-765 fields are
    written. The rest are intentionally left blank for the user to
    fill manually (signatures, optional parts). But no audit
    document exists listing "we DO write field X" vs "user must
    write field Y" — auditors and the future-you will not know
    which is which.
  proposed_fix: |
    Generate docs/uscis/forms/tps/coverage_matrix.md listing every
    AcroForm field and our policy: AUTO / USER / NA.

# ════════════════════════════════════════════════════════════════════════════
# CATEGORY C — INFRA / SAFETY NETS (block scaling beyond pilot)
# ════════════════════════════════════════════════════════════════════════════

C1_telemetry_funnel:
  severity: MEDIUM
  readiness: 0
  effort_hours: 6-10
  description: |
    No events fire from OCR/wizard/packet flow. We have ZERO data
    on where users abandon, how many uploads fail, what % click
    "Я введу данные руками", time-to-packet.
  proposed_events:
    - tps_started
    - upload_started{slot}
    - upload_quality_gate{code}
    - ocr_completed{fields_n, manual_review}
    - ocr_review_opened
    - ocr_edited{field}
    - step6_opened
    - packet_generated{i821_applied, i765_applied}
    - download_clicked
    - start_over_clicked
  proposed_fix: |
    Use the existing analytics pipeline (apps/web/src/components/
    analytics/Analytics.tsx). Add lightweight event hooks. NO PII.
    Surfaced Supabase MCP tools this session could host the table.

C2_playwright_e2e_in_ci:
  severity: MEDIUM
  readiness: 0
  effort_hours: 6-10
  description: |
    Every feature so far was manually verified via Chrome MCP. No CI
    catches regressions. Each new commit could silently break
    upload→OCR→review→Step6→ZIP.
  proposed_fix: |
    Playwright test using synthetic-passport.jpg fixture:
      - upload via /api/tps/ocr/extract
      - assert matched=true, fields=8
      - generate-packet → 200 + ZIP
      - assert i821_applied >= 32, i765_applied >= 20
      - assert README contains "WHERE TO MAIL" + "GOVERNMENT FEES"
      - assert NO «Верно»/«Неверно» in self-review screen

C3_i18n_drift_check:
  severity: LOW
  readiness: 30  # convention enforced manually, no automated check
  effort_hours: 2
  description: |
    Every new copy string requires 4 locale entries (uk/ru/en/es).
    Missing one falls through to raw-key rendering. No automated
    guard.
  proposed_fix: |
    Unit test that walks the T object in TPSWizard.tsx and the COPY
    objects in DocumentUploadScreen, SelfReviewScreen, OcrFieldEditModal,
    and fails if any key exists in en but not in uk/ru/es (or vice versa).

C4_adobe_visual_proof_in_ci:
  severity: LOW-MEDIUM
  readiness: 0  # only manual screenshots so far
  effort_hours: 6
  description: |
    pdftoppm renders work but use the same poppler font fallback path
    as our local dev. Adobe Reader / Preview render PDFs differently
    (Adobe respects the XFA layer Vercel can't fully strip). No CI
    check that fields are visually present in Adobe.
  proposed_fix: |
    Headless test using muPDF or pdfium-render (more Adobe-faithful).
    Or: weekly cron that renders into PNG, posts to Slack/Telegram
    for visual review.

C5_attestation_gate:
  severity: MEDIUM
  readiness: 0
  effort_hours: 4
  description: |
    v5 Translation Engine has an attestation gate ("I confirm the
    extracted data is correct"). TPS does not. Without it, a user
    who blindly trusts OCR has no checkpoint where THEY accept
    responsibility for the data they're mailing to USCIS.
  proposed_fix: |
    Add "Attestation" step between Step 6 review and packet generation:
      "I have reviewed the data above and confirm it is correct
       to the best of my knowledge. I understand Messenginfo does
       not submit forms to USCIS and is not a law firm."
    Checkbox + timestamp logged client-side.

