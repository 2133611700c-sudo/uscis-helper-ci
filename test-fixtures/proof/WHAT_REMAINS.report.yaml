D1_legacy_lint_overrides:
  severity: LOW
  description: |
    Pre-existing classifier/registry/adapters.ts use `module` as
    variable; scoped off via per-file overrides. Tests cover them
    so risk is low. Real refactor would touch v5 internals.

D2_tps_resume_continue_url_pattern:
  severity: LOW
  description: |
    Resume banner shows "↺ Начать заново" but no "Продолжить" button
    if you wanted to actually continue from the saved step. Current
    behavior: defaults to Step 1 unless ?continue=1 URL param is set.
    A UX could add an explicit "Continue from Step N" pill.

D3_no_user_account_persistence:
  severity: LOW
  description: |
    Wizard state is browser localStorage only. If user clears cookies
    or switches device, all progress is lost. Supabase MCP tools were
    surfaced this session — could host a "save and continue later"
    flow tied to email magic link.

