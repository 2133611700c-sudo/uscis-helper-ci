# ── SUMMARY ─────────────────────────────────────────────────────────────────
summary: |
  Question asked: "проверь, есть ли такой баг в Re-Parole".
  Answer found: Re-Parole did NOT have the WinAnsi 500 bug because it
  never filled a PDF in the first place — it only emitted text guides.
  But this exposed a bigger gap: the user still had to fill the actual
  I-131 by hand.

  Action taken: Built Re-Parole's I-131 packet builder using the same
  engine + transliterator + WinAnsi safety net that TPS uses.

  Result: /api/packet/generate now returns a 10-file ZIP. The new
  10-form-i131.pdf is the official USCIS form (Edition 01/20/25, 14
  pages) with the applicant's identity, address, contact, and arrival
  data already filled in. Cyrillic names go through KMU-55
  transliteration so USCIS officers see the same spelling the applicant
  has on their foreign passport.

  Tests prove "Шевченко" / "Тарас" / "Григорович" arrive in the I-131
  AcroForm as "Shevchenko" / "Taras" / "Hryhorovych" with no data loss
  and no exception.

  Translation engine bureau-cert PDF got the same KMU-55 safety upgrade
  defensively (it was dropping Cyrillic to '?' before).

  Both services now share the same Cyrillic → USCIS-Latin pipeline.
