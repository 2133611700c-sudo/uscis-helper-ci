# ── HONEST CROSS-SERVICE STATUS ──────────────────────────────────────────────
re_parole_bug_audit_result:
  did_re_parole_have_the_winansi_bug: NO
  reason: |
    Re-Parole's /api/packet/generate output was historically a ZIP of
    9 plain .txt files (overview, applicant summary, I-131 guide, filing
    instructions, document checklist, fees, disclaimer). No PDF AcroForm
    fill, no pdf-lib setText, no WinAnsi exposure. The crash mode that
    bit TPS literally could not happen.
  what_did_re_parole_have_instead: |
    A different gap — it told users HOW to fill I-131 but did not fill
    it. So a Ukrainian re-parole applicant still had to type their own
    name, DOB, address, A-Number, etc. by hand into 14 pages of paper or
    into my.uscis.gov. That's the gap this commit closes.
  did_translation_engine_have_a_relative_bug: YES_SOFTER
  translation_bug_shape: |
    lib/packet/pdf.ts contained sanitizeWinAnsi() which dropped any
    non-CP1252 char to '?'. So Cyrillic names ever leaking into the
    translation bureau-cert page would silently render as "????". Not a
    hard 500, but data loss. Now delegates to the shared toWinAnsiSafe()
    so it transliterates the way real Ukrainian passports already are.

