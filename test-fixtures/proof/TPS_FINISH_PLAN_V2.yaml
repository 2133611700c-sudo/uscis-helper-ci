# ── ANSWER TO USER'S 'CHECK + USE WHAT'S NEEDED' ─────────────────────────────
architect_summary: |
  Your 20-phase pack was useful as a checklist but heavy as a plan. I kept:
    - regression-lock test list (B.6)
    - PDF SHA256 + snapshot date guard (B.5)
    - file size + MIME whitelist (E.4)
    - forbidden-claims content guard rule (B.4)
    - operator runbook as a single file, not a phase (F.6)
    - rollback path inside runbook (not a separate phase)

  I rejected:
    - Splitting verification into 5 separate phases (3+4+5+6+7) — folded into one Phase C.4.
    - 'Disaster recovery' as a phase — it's one line in a runbook before there are users.
    - 'Operator documentation' as a phase — same.
    - Webpack-minification regression test — not unit-test-able, mitigated in code.
    - Date-consistency risk flag — requires legal classifier we deliberately don't ship.

  Total honest hours to controlled-beta-ready: 19-35 (depending on real-doc pilot outcome).
  Phases A-B-E are sandbox-doable now without waiting on Mac/photo.
  Phase C and D are sequential and require you.
  Phase G stays untouched until F.5 explicit go.
