phase_B_sandbox_completeness:
  title: "Everything I can finish without push/Mac/photo"
  owner: me
  hours: 12
  gate:
    - "All sub-tasks compile + typecheck PASS"
    - "Content guards PASS including new forbidden-claims rule"
    - "All new components have at least 1 vitest case (deferred run to Mac)"
  tasks:
    - id: B.1
      task: "CB.2 — Legal-risk routing UI surface"
      hours: 2.5
      from: pack_phase_10
      detail: |
        Existing TPSAnswers fields: has_criminal_concern, has_prior_tps_denial,
        left_us_without_advance_parole. Surface as 3 yes/no questions in
        GeneratePacketBlock above the PacketCompletenessChecker. On any yes →
        amber notice 'This may require licensed immigration attorney review'.
        Link to https://www.uscis.gov/scams-fraud-and-misconduct/avoid-scams/find-legal-services
        Locales: uk/ru/en/es. data-testids: legal-risk-{key}, legal-risk-notice.
        Do NOT block generate — informed user decision.

    - id: B.2
      task: "CB.3 — Manual fallback wiring"
      hours: 2
      from: pack_phase_11
      detail: |
        Reuse existing manual_review_queue table (built in phases 1-15).
        Add 'Нужна помощь' / 'I need help' button to:
          - DocumentUploadScreen (after OCR failure or image-quality reject)
          - SelfReviewScreen (after user clicks 'I'm not sure')
        POST to /api/tps/manual-review (new route) with: session_id, locale,
        contact_email, what_failed_label. NO image, NO PII beyond email.
        Server inserts row in manual_review_queue.

    - id: B.3
      task: "CB.4 — Output contract drift audit"
      hours: 1.5
      from: pack_phase_13
      detail: |
        Agent run: compare promised content in:
          - PacketCompletenessChecker (all 4 locales)
          - README.txt generator inside packetBuilder
          - landing page tpsHowSteps copy
        For each: forms included, edition strings, page counts, lockbox name,
        fee guidance language, no-USCIS-partner language, signature locations.
        Findings to OUTPUT_CONTRACT_AUDIT.report.yaml. Fix mismatches to a
        single source of truth (forms_manifest.json + lib/tps/lockbox.ts).

    - id: B.4
      task: "CB.5+ — i18n drift script + forbidden-claims content guard"
      hours: 1.5
      from: pack_forbidden_final_claims + pack_phase_14_i18n
      detail: |
        scripts/check-i18n-drift.mjs:
          - parse every TSX with COPY object having 'uk'|'ru'|'en'|'es' keys
          - for each key: all 4 locales must have a non-empty string
          - non-EN locale strings: warn on >= 3 chunked Latin words
            (whitelist: I-821, I-765, USCIS, EAD, ZIP, PDF, MRZ, U4U,
             Messenginfo, USCIS-Latin proper names like Phoenix Lockbox)
        scripts/check-content-guards.sh — add Rule 10 'Forbidden Claims':
          - 'fully done', 'paid launch ready', 'USCIS accepted', 'guaranteed',
            'we file for you', 'legal advice', 'certified', 'official USCIS partner'
          Search across apps/web/src/app and apps/web/src/components.

    - id: B.5
      task: "CB.6 — PDF SHA256 runtime guard + README snapshot date"
      hours: 1.5
      from: pack_phase_17
      detail: |
        - Compute SHA256 of each pinned USCIS PDF, add to forms_manifest.json
        - packetBuilder reads manifest at startup; if SHA256(public/uscis/.../X.pdf)
          != manifest, throw 'Form PDF tampered or replaced' with 500.
        - README.txt generator reads manifest.snapshot_date and writes:
          'Forms snapshot: 2026-05-10. Verify current editions at uscis.gov before mailing.'
        - Existing edition_match test already passes; add SHA test alongside.

    - id: B.6
      task: "Regression-lock test gap-fill"
      hours: 1.5
      from: pack_phase_16
      detail: |
        Existing tests already cover:
          - XFA/qpdf normalization (packetBuilder integration)
          - Cyrillic → KMU-55 Latin (transliterate.test.ts)
          - phone digits-only for I-765 (packetBuilder asserts no skip)
          - state dropdown skipped=0 (packetBuilder zero-skip assertion)
          - A-Number + class of admission routing (packetBuilder.test.ts, new in 6735324)
          - encrypted USCIS PDF load (covered by buildPacket throwing if not normalised)
        Adding:
          - PacketCompletenessChecker.test.ts: complete fixture → no missing-footer; incomplete → footer visible + missing key listed
          - attestation gate (existing component test — verify)
          - WinAnsi crash regression: explicit test calling toWinAnsiSafe('Шевченко') and asserting no '?' in output
          - latinPreview rendering: SelfReviewScreen with Cyrillic row produces review-latin-{key} testid
        SKIP (pack item): 'webpack minification: use instanceof' — environmental,
        not unit-test-able, already mitigated in pdfPrefiller code path.

    - id: B.7
      task: "Re-Parole SP-1 root fix — streaming response"
      hours: 2
      from: my_plan_B.7
      detail: |
        /api/packet/generate currently uploads ZIP to Supabase Storage + signed URL.
        Switch to streaming response (same pattern as /api/tps/generate-packet).
        Remove createBucket / upload / createSignedUrl calls. Update Re-Parole
        wizard to consume blob URL like TPS does.
        Risk: existing sessions with open signed URLs lose access on cutover.
        Mitigation: 7-day grace window is fine — old URLs were 7-day TTL anyway.

    - id: B.8
      task: "Sandbox gates run after each commit + final consolidation"
      hours: 0.5

