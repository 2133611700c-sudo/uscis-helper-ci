# ── WHY THIS IS THE RIGHT SHAPE FOR ELDER UKRAINIAN USERS ──────────────────
why_a11y_was_the_priority: |
  Our actual audience: Ukrainian refugees 30-80 years old, many on
  basic Android phones, many with age-related vision difficulties.
  USCIS officers don't care about font sizes — but our user does.
  A 70-year-old reading the wizard in Russian on a 5.5-inch screen
  cannot consume 11px grey italic to understand 'we are not a lawyer'.
  Trust is built or lost in those exact pixels.

  The accessibility pass is not cosmetic. It directly maps to:
    - Шевченко → Shevchenko being a TRUST signal (must be readable)
    - 'Messenginfo is not a law firm' being a REGULATORY surface
      (must be visible, not hidden in tiny grey)
    - 'Consider talking to a lawyer' amber notice being a SAFETY surface
      for at-risk users (criminal record / prior denial / left without AP)
    - Missing-fields counter being the user's only signal that Generate
      is blocked

