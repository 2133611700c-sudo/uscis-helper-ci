findings:
  - id: OC-1
    severity: high
    surface: landing
    file: apps/web/src/app/[locale]/services/tps-ukraine/page.tsx
    line_range: "L36, L52, L67, L89, L116-117, L124, L140, L155, L177, L204-205, L212, L228, L243, L265, L292-293, L300, L316, L331, L353, L380-381"
    drift_description: |
      Landing aggressively promises I-912 handling. Examples:
        L36 (uk metaDesc): "Підготуйте всю інформацію для подання TPS Ukraine (Form I-821, I-765, I-912)"
        L228 (en): "instructions for what to enter in I-821 / I-765 / I-912"
        L292-293 (en FAQ): "What is a fee waiver / I-912? — Form I-912 lets you request..."
      However:
        - packetBuilder.ts buildPacket() ONLY writes I-821.pdf and conditionally I-765.pdf into the ZIP. There is no I-912 prefiller, no I-912 field map (apps/web/src/lib/tps/forms/ has only i821FieldMap.ts and i765FieldMap.ts), no I-912 PDF in apps/web/public/uscis/tps/.
        - Checker UI never displays an I-912 line.
        - README only mentions I-912 as a fee-lookup pointer when wants_fee_waiver is true.
      A user who selects "I want a fee waiver" in the wizard expects an I-912 PDF in their ZIP based on the landing; they get a README note instead. Trust-loss vector.
    recommended_fix: |
      Either (a) drop I-912 from the landing copy until an I-912 prefiller ships (preferred for controlled beta), or (b) add explicit phrasing like "We tell you how to fill I-912 by hand on the official USCIS form — we do not yet generate it" everywhere I-912 is mentioned on the landing.
  - id: OC-2
    severity: high
    surface: checker
    file: apps/web/src/components/tps/PacketCompletenessChecker.tsx
    line_range: "L112, L138, L164, L190"
    drift_description: |
      Checker hardcodes the lockbox as "Phoenix" for every user in every locale:
        L164 (en): "USCIS Lockbox in Phoenix (for Ukrainian nationals filing TPS / U4U)."
      But filingGuidance.ts STATE_TO_LOCKBOX maps about half of US states to the Chicago lockbox (AL, AZ, FL, GA, IL, IN, NY, OH, …) and the other half to Phoenix (CA, MI, NJ, NV, TX, …). A user filing from New York will read "Phoenix" on the pre-download Checker card, then open the README to see a Chicago address. This is exactly the trust-loss pattern the audit targets.
    recommended_fix: |
      Pass the user's us_address_state into PacketCompletenessChecker via props, call lockboxFor(state), and render the resolved lockbox display_name (or render a neutral "Your USCIS lockbox depends on your state — the exact address appears in the README" if state is unknown). Drop the hardcoded "Phoenix" string.
  - id: OC-3
    severity: medium
    surface: readme
    file: apps/web/src/lib/tps/packetBuilder.ts
    line_range: "L153-189"
    drift_description: |
      README is generated in English only. The Checker UI and the landing both ship four locales (uk/ru/en/es) for the same content. A Ukrainian-language user goes through a fully Ukrainian wizard, sees a Ukrainian Checker card, opens README.txt and gets English. This is a consistency gap, not a contradiction — but it weakens the contract because the same user cannot read the post-download instructions in their own language.
    recommended_fix: |
      Either localize the README (pass locale through generate-packet route and switch buildReadme), or add a short Ukrainian/Russian/Spanish header section to the README that mirrors the most important promises (especially "WHAT WE DID NOT DO" and the lockbox).
  - id: OC-4
    severity: low
    surface: checker
    file: apps/web/src/components/tps/PacketCompletenessChecker.tsx
    line_range: "L99-202 (all four COPY blocks)"
    drift_description: |
      The Checker has no "Messenginfo does not file" / "We are not a law firm" message of its own. The sibling GeneratePacketBlock attestation row carries it, and the post-download success block repeats it, so the user does see it before clicking Generate. But the Checker card — which the audit names as one of the three surfaces — is silent on this. Spec asks "must appear in README + landing + Checker (in spirit, locale-aware)"; the spirit appears in the attestation row directly below the Checker, but not inside the Checker section itself.
    recommended_fix: |
      Add one final small line at the bottom of the Checker card: e.g. "Messenginfo prepares the packet. You file with USCIS yourself." in each locale, sized at 11px var(--text-3), so the Checker is self-contained.
  - id: OC-5
    severity: low
    surface: landing
    file: apps/web/src/app/[locale]/services/tps-ukraine/page.tsx
    line_range: "L41, L129, L217, L305 (legalOne pill in all 4 locales)"
    drift_description: |
      The "For guidance only" / "Тільки для довідки" / "Только для справки" / "Solo orientativo" legalOne pill on the landing is shorter than the parallel README disclaimer. The README says "We did NOT determine your eligibility — please verify on uscis.gov." The landing FAQ covers legal advice but does NOT include the eligibility-determination disclaimer. Not a contradiction, but the README is stricter than the landing on one specific dimension.
    recommended_fix: |
      Add a one-line eligibility-determination disclaimer to the landing FAQ (or trustCards) so the landing matches the README's commitment level. Example: "Eligibility is decided by USCIS — we cannot tell you if you qualify."

positive_observations:
  - "I-821 edition string (01/20/25) and I-765 edition string (08/21/25) match exactly between Checker (PacketCompletenessChecker.tsx L218/L220) and README (packetBuilder.ts L24/L25), with a code comment stating the refresh script will fail until both move in lockstep."
  - "I-821 page count (13) and I-765 page count (7) match between Checker, GeneratePacketBlock nsZip section, and the actual PDFs."
  - "No hardcoded USCIS-fee dollar amount appears anywhere in Checker, README, or landing. README header literally says 'GOVERNMENT FEES (verify current amounts on uscis.gov before mailing)'. Landing's $15/$25/$35/$45 are unambiguously the Messenginfo preparation fee, clearly separated from the USCIS-fee row."
  - "The forbidden-phrase list (we file / USCIS-approved / guaranteed / certified / official USCIS partner) returns zero user-facing hits. Every appearance is either inside a source-code comment listing the forbidden phrases or inside a negation (e.g. 'We do NOT guarantee USCIS acceptance')."
  - "The README's WHAT WE DID NOT DO section (L176-179), landing's legalOne pill, landing's FAQ, footer, TPSWizard s5Disclaimer, and GeneratePacketBlock attestation all carry consistent 'Messenginfo does not file / not a law firm / no guarantee' language."
  - "I-765 conditional logic is consistent across surfaces: Checker shows i765NotIncluded when wantsEad !== true; packetBuilder skips I-765 prefill when answers.wants_ead is falsy; README explicitly writes 'I-765 was not generated (you chose not to request an EAD).'."
  - "filingGuidance.ts is a clean source-of-truth module: lockboxes are snapshotted with date + URL, fees are computed by enumeration not by dollar amount, and the public API never invents an address."
  - "GeneratePacketBlock attestation gate (L270, L327, L213, L156) requires the user to explicitly check 'I understand Messenginfo does not file documents on my behalf and is not a law firm' before the Generate button enables — same disclaimer language on all 4 locales."

verdict_for_controlled_beta:
  drift_blocks_beta: yes
  forbidden_phrases_found: no
  one_paragraph_summary: |
    Forbidden-phrase scan is clean and the edition/page-count contract is tight, but two drift findings should block controlled beta. OC-1: the landing markets I-912 as part of the wizard's deliverable in all four locales (meta, how-it-works, pricing, FAQ) while the packet generator does not produce an I-912 PDF and the Checker does not mention I-912 — a fee-waiver user will feel misled when they unzip and find no I-912. OC-2: the Checker hardcodes "USCIS Lockbox in Phoenix" for every user, but ~half of states route to Chicago in the README — a New York filer will see Phoenix in the Checker and Chicago in the README within five seconds. Fix OC-1 by trimming I-912 from the landing copy (or adding "we do not generate this form yet"), and fix OC-2 by passing the user's state into the Checker and rendering the resolved lockbox name. The medium-severity README-localization gap (OC-3) and the two low-severity polish items (OC-4, OC-5) can ship as follow-ups.
