# ── DEEPSEEK DOCUMENT BRAIN V1 — WHAT SHIPPED TODAY ─────────────────────────
deepseek_brain_v1:
  file: apps/web/src/lib/tps/ai/documentBrain.ts
  classification_coverage:
    - international_passport
    - ukrainian_internal_passport
    - i94
    - ead
    - uscis_notice
    - unknown
  field_coverage:
    - family_name, given_name, middle_name
    - dob, sex, country_of_birth, country_of_nationality
    - passport_number, passport_country_of_issuance, passport_expiration_date
    - i94_admission_number, last_entry_date, i94_class_of_admission
    - a_number, ead_category_on_card, ead_expiration_date
  contract_locked:
    - AI suggests, validators decide, user confirms
    - No direct PDF write — output flows into TpsExtractedField[]
    - No legal-eligibility decision
    - No fabricated fields (omit if unsure)
  hardening_layers:
    1: zod schema validation of structured output
    2: KMU-55 + toWinAnsiSafe enforcement on every final_value
       (Brain claimed final_value is OVERWRITTEN — never trusted as-is)
    3: nameNormalizer.analyseNameField on name fields (mixed-script
       detection, abnormal casing, latin-lookalike substitution)
    4: deterministic field-shape validators (validateBrainField):
       dates, passport length, I-94 digits, A-number digits, sex domain,
       EAD shape, no residual Cyrillic
    5: confidence < 0.7 → requires_review forced true
    6: disagreement between AI final_value and KMU-55 → requires_review
  fallback_strategy:
    runs_when: "TPS_AI_BRAIN_ENABLED=1 AND (no rule module OR <3 rule fields)"
    rule_modules_win: "deterministic > AI when both produce the same field key"
    failure_isolation: "Brain failure never crashes OCR response"
  feature_flag: TPS_AI_BRAIN_ENABLED (off by default per env)
  privacy:
    sends_to_deepseek: "raw_text + first 30 line texts ONLY"
    never_sends: "image bytes, session_id, user identifier, IP, ambient metadata"
    input_cap: 4000 chars
    response_logging: "error_code + raw_response_length only — never field values"

