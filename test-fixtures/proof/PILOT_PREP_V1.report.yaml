    fail_gracefully_matched_false_no_false_data:
      - crop_no_mrz (MRZ literally absent)
      - downscale_600w, downscale_1000w (JPEG artifact?)
      - garbage_non_document (non-passport image)
      - rot_15deg, rot_30deg (significant rotation)
    rejected_by_quality_gate:
      - tiny_50x50 → HTTP 422 quality_error.code=too_small ✅
  findings:
    - "Google Vision is robust to blur, low light, low-quality JPEG, and even MRZ glare overlap."
    - "Rotation ≥15° is the hard failure mode — phone-held-at-angle is a real risk for production."
    - "When OCR fails, it returns matched=false cleanly — NO false-positive data extracted."
    - "Quality gate fires only for too_small. Other failure modes (too_blurry) are not yet emitted by preprocess (sharp module declared the code but doesn't produce it). KG3."
    - "Downscale 300px works but 600px / 1000px don't — JPEG compression artifact at specific resolutions. Worth noting."

