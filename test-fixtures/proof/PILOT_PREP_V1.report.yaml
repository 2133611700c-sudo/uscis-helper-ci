PP_T3_privacy_buffer_audit:
  status: PASS_NO_CODE_CHANGE
  finding: |
    Route reads file.arrayBuffer() into a local const, passes it through
    preprocessImage() → googleVisionProvider, never logs the buffer, never
    persists to disk, never caches in module scope. After the response
    returns, the buffer is GC-eligible. Comment added to the route.
  surfaceable_headers_without_pii:
    - X-OCR-Preprocess-Resized
    - X-OCR-Preprocess-Width
    - X-OCR-Preprocess-Height
    - X-OCR-Provider
    - X-TPS-Module-* (counts only, no field values)

