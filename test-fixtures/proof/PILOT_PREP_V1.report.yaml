  results:
    pass_ocr_extracts_all_8_fields:
      - synthetic-passport.jpg (baseline)
      - blur_r1, blur_r2, blur_r4 (Gaussian blur radius 1/2/4)
      - bright_0.4, bright_0.6, bright_1.4 (dim/over-bright)
      - jpeg_q20, jpeg_q40, jpeg_q60 (low-quality JPEG)
      - glare_over_mrz (semi-transparent glare over MRZ)
      - realistic_phone (rotated 8° + blur 1.2 + bright 0.7 + q70)
